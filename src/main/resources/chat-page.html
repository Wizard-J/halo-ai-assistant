<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>AI 智能助手</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css">
    <style>
        :root {
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #eff6ff;
            --surface: #ffffff;
            --surface-subtle: #f8fafc;
            --surface-raised: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --text-faint: #94a3b8;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --success: #16a34a;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
            --shadow-menu: 0 16px 36px rgba(15, 23, 42, 0.12);
            --content-width: 820px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --accent: #60a5fa;
                --accent-hover: #93c5fd;
                --accent-soft: #172554;
                --surface: #0b1120;
                --surface-subtle: #111827;
                --surface-raised: #172033;
                --text: #f8fafc;
                --text-muted: #a8b3c7;
                --text-faint: #758198;
                --border: #253047;
                --border-strong: #3a4964;
                --success: #4ade80;
                --danger: #f87171;
                --danger-soft: #3f161c;
                --shadow-menu: 0 18px 40px rgba(0, 0, 0, 0.42);
            }
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--surface);
            color: var(--text);
            font-family: Inter, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        button,
        textarea {
            font: inherit;
        }

        button {
            color: inherit;
        }

        button:focus-visible,
        textarea:focus-visible {
            outline: 3px solid color-mix(in srgb, var(--accent) 24%, transparent);
            outline-offset: 2px;
        }

        .app {
            display: grid;
            grid-template-rows: 64px minmax(0, 1fr);
            height: 100%;
            background: var(--surface);
        }

        .app-header {
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 0;
            padding: 0 28px;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--surface) 94%, transparent);
            backdrop-filter: blur(16px);
        }

        .brand,
        .header-actions,
        .connection {
            display: flex;
            align-items: center;
        }

        .brand {
            min-width: 0;
            gap: 12px;
        }

        .brand-mark,
        .assistant-avatar {
            display: grid;
            flex: 0 0 auto;
            place-items: center;
            border-radius: 50%;
            background: var(--accent);
            color: #ffffff;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            font-size: 18px;
        }

        .brand-copy {
            display: flex;
            align-items: baseline;
            min-width: 0;
            gap: 10px;
        }

        .brand-title {
            overflow: hidden;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .connection {
            gap: 7px;
            color: var(--text-muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .connection-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
        }

        .header-actions {
            gap: 8px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            gap: 7px;
            padding: 0 13px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--surface-raised);
            color: var(--text);
            cursor: pointer;
            transition: border-color 160ms ease, background 160ms ease, color 160ms ease, transform 160ms ease;
        }

        .button:hover {
            border-color: var(--border-strong);
            background: var(--surface-subtle);
        }

        .button:active {
            transform: translateY(1px);
        }

        .button-primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #ffffff;
        }

        .button-primary:hover {
            border-color: var(--accent-hover);
            background: var(--accent-hover);
        }

        .button-icon {
            width: 38px;
            padding: 0;
            font-size: 18px;
        }

        .workspace {
            position: relative;
            min-height: 0;
        }

        .conversation {
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            height: 100%;
        }

        .scroll-area {
            overflow-y: auto;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
        }

        .content-column {
            width: min(calc(100% - 40px), var(--content-width));
            margin: 0 auto;
            padding: 58px 0 34px;
        }

        .welcome {
            padding: 0 52px 48px;
        }

        .welcome-heading {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .assistant-avatar {
            width: 42px;
            height: 42px;
            font-size: 21px;
        }

        .welcome h1 {
            margin: 0 0 5px;
            font-size: clamp(22px, 3vw, 28px);
            line-height: 1.25;
            letter-spacing: -0.03em;
        }

        .welcome p {
            margin: 0;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 24px;
            padding-left: 58px;
        }

        .suggestion {
            display: inline-flex;
            align-items: center;
            min-height: 42px;
            gap: 8px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
        }

        .suggestion i {
            color: var(--accent);
            font-size: 17px;
        }

        .suggestion:hover {
            border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
            background: var(--accent-soft);
            color: var(--accent);
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .message-row {
            display: flex;
            align-items: flex-start;
            gap: 13px;
        }

        .message-row.user {
            justify-content: flex-end;
            padding-left: 20%;
        }

        .message-row.assistant {
            padding-right: 8%;
        }

        .avatar-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; vertical-align: middle; }
        .avatar-emoji { font-size: 20px; line-height: 1; }
        .message-avatar img,
        .assistant-avatar img,
        .welcome-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .message-avatar {
            display: grid;
            flex: 0 0 auto;
            width: 30px;
            height: 30px;
            place-items: center;
            margin-top: 1px;
            border-radius: 50%;
            background: var(--accent);
            color: #ffffff;
            font-size: 15px;
        }

        .message-body {
            min-width: 0;
            max-width: 100%;
        }

        .message-meta {
            margin-bottom: 8px;
            color: var(--text-faint);
            font-size: 12px;
        }

        .user-bubble {
            padding: 10px 14px;
            border-radius: 11px 11px 3px 11px;
            background: var(--accent);
            color: #ffffff;
            line-height: 1.55;
            white-space: pre-wrap;
        }

        .assistant-content {
            color: var(--text);
            font-size: 15px;
            line-height: 1.78;
            overflow-wrap: anywhere;
        }

        .assistant-content.typing::after {
            content: "";
            display: inline-block;
            width: 2px;
            height: 1.05em;
            margin-left: 3px;
            vertical-align: -2px;
            background: var(--accent);
            animation: blink 900ms steps(1) infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 1ms !important;
            }
        }

        .assistant-content h1,
        .assistant-content h2,
        .assistant-content h3 {
            margin: 22px 0 10px;
            line-height: 1.35;
            letter-spacing: -0.02em;
        }

        .assistant-content h1 { font-size: 21px; }
        .assistant-content h2 { font-size: 18px; }
        .assistant-content h3 { font-size: 16px; }

        .assistant-content p {
            margin: 0 0 12px;
        }

        .assistant-content ul,
        .assistant-content ol {
            margin: 8px 0 15px;
            padding-left: 23px;
        }

        .assistant-content li {
            margin: 5px 0;
        }

        .assistant-content code {
            padding: 2px 5px;
            border-radius: 5px;
            background: var(--surface-subtle);
            color: var(--accent);
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.9em;
        }

        .assistant-content pre {
            overflow-x: auto;
            margin: 14px 0;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--surface-subtle);
        }

        .assistant-content pre code {
            padding: 0;
            background: transparent;
            color: var(--text);
        }

        .assistant-content a {
            color: var(--accent);
            text-underline-offset: 3px;
        }

        .assistant-content table {
            width: 100%;
            margin: 14px 0;
            border-collapse: collapse;
            font-size: 14px;
        }

        .assistant-content th,
        .assistant-content td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        .assistant-content th {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 650;
        }

        .message-error {
            padding: 12px 14px;
            border: 1px solid color-mix(in srgb, var(--danger) 28%, var(--border));
            border-radius: 9px;
            background: var(--danger-soft);
            color: var(--danger);
            line-height: 1.55;
        }

        .activity {
            display: flex;
            align-items: center;
            width: fit-content;
            gap: 9px;
            margin: 18px 0 0 43px;
            padding: 8px 11px;
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .activity[hidden] {
            display: none;
        }

        .activity-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border-strong);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 750ms linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .composer-zone {
            position: relative;
            z-index: 10;
            padding: 12px 20px 18px;
            border-top: 1px solid var(--border);
            background: color-mix(in srgb, var(--surface) 94%, transparent);
            backdrop-filter: blur(18px);
        }

        .composer-wrap {
            position: relative;
            width: min(100%, var(--content-width));
            margin: 0 auto;
        }

        .composer {
            display: flex;
            align-items: flex-end;
            gap: 9px;
        }

        .composer-box {
            display: flex;
            flex: 1;
            align-items: flex-end;
            min-width: 0;
            gap: 8px;
            padding: 7px;
            border: 1px solid var(--border-strong);
            border-radius: 13px;
            background: var(--surface-raised);
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        .composer-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
        }

        .composer textarea {
            flex: 1;
            min-height: 38px;
            max-height: 156px;
            padding: 8px 5px;
            resize: none;
            overflow-y: auto;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--text);
            line-height: 1.55;
        }

        .composer textarea::placeholder {
            color: var(--text-faint);
        }

        .send-button,
        .stop-button {
            width: 38px;
            height: 38px;
            border: 0;
            border-radius: 9px;
            cursor: pointer;
        }

        .send-button {
            background: var(--accent);
            color: #ffffff;
            font-size: 18px;
        }

        .send-button:hover {
            background: var(--accent-hover);
        }

        .send-button:disabled {
            background: var(--border-strong);
            cursor: not-allowed;
        }

        .stop-button {
            border: 1px solid color-mix(in srgb, var(--danger) 35%, var(--border));
            background: var(--surface);
            color: var(--danger);
            font-size: 17px;
        }

        .stop-button[hidden],
        .send-button[hidden] {
            display: none;
        }

        .composer-hint {
            margin: 7px 0 0 50px;
            color: var(--text-faint);
            font-size: 11px;
        }

        .tool-menu {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 0;
            display: grid;
            width: 260px;
            padding: 7px;
            border: 1px solid var(--border);
            border-radius: 11px;
            background: var(--surface-raised);
            box-shadow: var(--shadow-menu);
        }

        .tool-menu[hidden] {
            display: none;
        }

        .tool-menu button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 0;
            border-radius: 7px;
            background: transparent;
            color: var(--text);
            text-align: left;
            cursor: pointer;
        }

        .tool-menu button:hover {
            background: var(--surface-subtle);
        }

        .tool-menu i {
            color: var(--accent);
            font-size: 17px;
        }

        .drawer-backdrop {
            position: fixed;
            z-index: 40;
            inset: 0;
            background: rgba(15, 23, 42, 0.24);
        }

        .drawer-backdrop[hidden] {
            display: none;
        }

        .history-drawer {
            position: fixed;
            z-index: 50;
            top: 0;
            right: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            width: min(380px, 90vw);
            height: 100%;
            border-left: 1px solid var(--border);
            background: var(--surface);
            box-shadow: var(--shadow-menu);
            transform: translateX(100%);
            transition: transform 220ms ease;
        }

        .history-drawer.open {
            transform: translateX(0);
        }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .drawer-header h2 {
            margin: 0;
            font-size: 17px;
        }

        .history-list {
            overflow-y: auto;
            padding: 10px;
        }

        .history-empty {
            padding: 28px 16px;
            color: var(--text-muted);
            text-align: center;
        }

        .history-item {
            display: block;
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: var(--text);
            text-align: left;
            cursor: pointer;
        }

        .history-item:hover {
            background: var(--surface-subtle);
        }

        .history-item-title {
            display: block;
            overflow: hidden;
            font-weight: 600;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-time {
            display: block;
            margin-top: 4px;
            color: var(--text-faint);
            font-size: 12px;
        }

        @media (max-width: 720px) {
            .app {
                grid-template-rows: 58px minmax(0, 1fr);
            }

            .app-header {
                padding: 0 14px;
            }

            .brand-copy .connection,
            .button-label {
                display: none;
            }

            .content-column {
                width: min(calc(100% - 28px), var(--content-width));
                padding-top: 32px;
            }

            .welcome {
                padding: 0 0 34px;
            }

            .suggestions {
                display: grid;
                padding-left: 0;
            }

            .suggestion {
                justify-content: flex-start;
            }

            .message-row.assistant {
                padding-right: 0;
            }

            .message-row.user {
                padding-left: 12%;
            }

            .composer-zone {
                padding: 10px 12px max(12px, env(safe-area-inset-bottom));
            }

            .composer-hint {
                display: none;
            }
        }

    .persona-menu-item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
        font-size: 14px;
        color: var(--text, #333);
        text-align: left;
        transition: background 0.15s;
        box-sizing: border-box;
    }
    .persona-menu-item:hover {
        background: var(--hover-bg, rgba(0,0,0,0.05));
    }
    .persona-menu-item.active {
        background: var(--active-bg, rgba(37,99,235,0.08));
        color: var(--active-color, #2563eb);
        font-weight: 600;
    }
    .persona-menu-item .pi-check {
        margin-left: auto;
        color: #2563eb;
    }
    .persona-menu-item img {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
    }
    .persona-menu-item i.avatar-img {
        font-size: 20px;
    }
    .persona-menu-item .avatar-emoji {
        font-size: 20px;
        line-height: 1;
    }
    .persona-menu-item span {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    /* Persona 菜单容器保证垂直排列 */
    #personaList {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    /* Persona 菜单项图标统一样式 */
    .persona-menu-item > i:first-child,
    .persona-menu-item > img:first-child,
    .persona-menu-item > span:first-child {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 20px;
        border-radius: 50%;
    }
    .persona-menu-item.active > i:first-child {
        color: var(--active-color, #2563eb);
    }
    </style>
</head>
<body>
<div class="app">
    <header class="app-header">
        <div class="brand">
            <span class="brand-mark" aria-hidden="true"><i class="ri-sparkling-2-fill"></i></span>
            <div class="brand-copy">
                <span class="brand-title">AI 智能助手</span>
                <span class="connection"><span class="connection-dot"></span>AI 服务已连接</span>
            </div>
        </div>
        <div class="header-actions">
            <div class="persona-selector" style="position:relative">
                <button class="button" id="personaButton" type="button" title="切换角色" style="gap:6px">
                    <span id="personaButtonIcon">🤖</span>
                    <span id="personaButtonLabel" class="button-label">AI 智能助手</span>
                    <i class="ri-arrow-down-s-line" aria-hidden="true"></i>
                </button>
                <div class="persona-menu" id="personaMenu" hidden
                     style="position:absolute;top:calc(100% + 6px);right:0;min-width:220px;
                            background:var(--surface-raised);border:1px solid var(--border);
                            border-radius:12px;box-shadow:var(--shadow-menu);z-index:100;
                            padding:6px;overflow:hidden">
                    <div id="personaList"></div>
                    <div style="border-top:1px solid var(--border);margin:6px 0 0;padding:6px 0 0">
                        <button class="persona-menu-item" id="managePersonaButton" type="button"
                                style="color:var(--text-muted);font-size:13px;width:100%;text-align:left;
                                       padding:8px 12px;border:none;border-radius:8px;
                                       background:transparent;cursor:pointer">
                            <i class="ri-settings-3-line" aria-hidden="true"></i> 管理 Persona
                        </button>
                        <button class="persona-menu-item" id="uploadContextButton" type="button"
                                style="color:var(--text-muted);font-size:13px;width:100%;text-align:left;
                                       padding:8px 12px;border:none;border-radius:8px;
                                       background:transparent;cursor:pointer">
                            <i class="ri-file-text-line" aria-hidden="true"></i> 上传上下文 (AGENTS.md)
                        </button>
                    </div>
                </div>
            </div>
            <button class="button" id="autoOpsTestButton" type="button" title="测试 RSS、AI、作者和草稿创建">
                <i class="ri-flask-line" aria-hidden="true"></i>
                <span class="button-label">测试自动运维</span>
            </button>
            <button class="button" id="historyButton" type="button">
                <i class="ri-history-line" aria-hidden="true"></i>
                <span class="button-label">历史记录</span>
            </button>
            <button class="button button-primary" id="newChatButton" type="button">
                <i class="ri-add-line" aria-hidden="true"></i>
                <span class="button-label">新建对话</span>
            </button>
        </div>
    </header>

    <main class="workspace">
        <section class="conversation" aria-label="AI 对话">
            <div class="scroll-area" id="scrollArea">
                <div class="content-column">
                    <section class="welcome" id="welcome">
                        <div class="welcome-heading">
                            <span class="assistant-avatar" aria-hidden="true" id="welcomeAvatar"><i class="ri-sparkling-2-fill"></i></span>
                            <div>
                                <h1 id="welcomeTitle">你好，我是 Halo AI 智能助手</h1>
                                <p id="welcomeSubtitle">我可以帮你管理博客文章、分类、标签和评论。</p>
                            </div>
                        </div>
                        <div class="suggestions" aria-label="快捷建议">
                            <button class="suggestion" type="button" data-prompt="帮我查看最近发布的文章">
                                <i class="ri-file-list-3-line" aria-hidden="true"></i>查看最近发布的文章
                            </button>
                            <button class="suggestion" type="button" data-prompt="创建一个名为 AI 工具的新标签">
                                <i class="ri-price-tag-3-line" aria-hidden="true"></i>创建一个新标签
                            </button>
                            <button class="suggestion" type="button" data-prompt="查看待审核的评论">
                                <i class="ri-chat-check-line" aria-hidden="true"></i>查看待审核评论
                            </button>
                        </div>
                    </section>

                    <div class="messages" id="messages" aria-live="polite"></div>
                    <div class="activity" id="activity" hidden>
                        <span class="activity-spinner" aria-hidden="true"></span>
                        <span>正在连接 AI 服务…</span>
                    </div>

            <footer class="composer-zone">
                <div class="composer-wrap">
                    <div class="tool-menu" id="toolMenu" hidden>
                        <button type="button" data-prompt="帮我查看最近发布的文章">
                            <i class="ri-file-list-3-line" aria-hidden="true"></i>查看文章列表
                        </button>
                        <button type="button" data-prompt="帮我创建一篇新文章">
                            <i class="ri-draft-line" aria-hidden="true"></i>创建新文章
                        </button>
                        <button type="button" data-prompt="查看所有分类和标签">
                            <i class="ri-folders-line" aria-hidden="true"></i>管理分类与标签
                        </button>
                        <button type="button" data-prompt="查看待审核的评论">
                            <i class="ri-chat-check-line" aria-hidden="true"></i>审核评论
                        </button>
                    </div>
                    <form class="composer" id="composer">
                        <div class="composer-box">
                            <button class="button button-icon" id="toolButton" type="button" aria-label="打开工具菜单" title="工具">
                                <i class="ri-equalizer-2-line" aria-hidden="true"></i>
                            </button>
                            <textarea id="input" rows="1" maxlength="4000" placeholder="输入你的需求，例如：创建文章、管理分类、查看评论…" aria-label="输入你的需求"></textarea>
                            <button class="send-button" id="sendButton" type="submit" aria-label="发送消息" title="发送">
                                <i class="ri-send-plane-2-fill" aria-hidden="true"></i>
                            </button>
                            <button class="stop-button" id="stopButton" type="button" aria-label="停止生成" title="停止生成" hidden>
                                <i class="ri-stop-fill" aria-hidden="true"></i>
                            </button>
                        </div>
                    </form>
                    <p class="composer-hint">Enter 发送，Shift + Enter 换行</p>
                </div>
            </footer>
        </section>
    </main>
</div>

<div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
<aside class="history-drawer" id="historyDrawer" aria-hidden="true">
    <div class="drawer-header">
        <h2>历史记录</h2>
        <button class="button button-icon" id="closeHistoryButton" type="button" aria-label="关闭历史记录">
            <i class="ri-close-line" aria-hidden="true"></i>
        </button>
    </div>
    <div class="history-list" id="historyList"></div>
</aside>

<script>
    // Persona-aware storage keys
    const SESSION_KEY = 'halo-ai-session-v1';
    function storageKey() { return 'halo-ai-conv-' + activePersona.id + '-v1'; }
    const PERSONA_LIST_KEY = 'halo-ai-personas-v1';
    const scrollArea = document.getElementById('scrollArea');
    const messagesElement = document.getElementById('messages');
    const welcomeElement = document.getElementById('welcome');
    const activityElement = document.getElementById('activity');
    const composer = document.getElementById('composer');
    const input = document.getElementById('input');
    const sendButton = document.getElementById('sendButton');
    const stopButton = document.getElementById('stopButton');
    const toolButton = document.getElementById('toolButton');
    const autoOpsTestButton = document.getElementById('autoOpsTestButton');
    const toolMenu = document.getElementById('toolMenu');
    const historyButton = document.getElementById('historyButton');
    const newChatButton = document.getElementById('newChatButton');
    const historyDrawer = document.getElementById('historyDrawer');
    const historyList = document.getElementById('historyList');
    const drawerBackdrop = document.getElementById('drawerBackdrop');
    const closeHistoryButton = document.getElementById('closeHistoryButton');

    let activePersona = { id: 'default', displayName: 'AI 智能助手', iconUrl: null, brandColor: '#2563eb', greeting: '你好，我是 Halo AI 智能助手' };
    let personas = [];
    let loadingPersonas = false;
    let history = [];
    let conversationId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
    // 会话 ID：优先用服务端登录用户，无登录时回退到 localStorage
    let serverSessionId = null;
    let serverFetchDone = false;

    let sessionId = getOrCreateSessionId();
    let isStreaming = false;
    let abortController = null;

    async function fetchServerSession() {
        if (serverFetchDone) return;
        serverFetchDone = true;
        try {
            const resp = await fetch('/api/ai-assistant/me');
            if (resp.ok) {
                const data = await resp.json();
                if (data.authenticated && data.sessionId) {
                    serverSessionId = data.sessionId;
                }
            }
        } catch (e) { /* 静默失败，回退到 localStorage */ }
    }

    function getOrCreateSessionId() {
        // 优先使用服务端 session
        if (serverSessionId) {
            try { localStorage.setItem(SESSION_KEY, serverSessionId); } catch(e) {}
            return serverSessionId;
        }
        // 回退：localStorage 持久化
        try {
            let sid = localStorage.getItem(SESSION_KEY);
            if (!sid) {
                sid = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + '-' + Math.random().toString(36).slice(2, 10);
                localStorage.setItem(SESSION_KEY, sid);
            }
            return sid;
        } catch (e) { return ''; }
    }

    function escapeHtml(value) {
        return value
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function renderInline(value) {
        return escapeHtml(value)
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
            .replace(/\[([^\]]+)]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    function splitTableRow(line) {
        return line.trim().replace(/^\||\|$/g, '').split('|').map(cell => cell.trim());
    }

    function renderMarkdown(source) {
        const lines = source.replace(/\r\n/g, '\n').split('\n');
        const html = [];
        let index = 0;
        let listType = null;
        let inCode = false;
        let codeLines = [];

        function closeList() {
            if (listType) {
                html.push(`</${listType}>`);
                listType = null;
            }
        }

        while (index < lines.length) {
            const line = lines[index];

            if (line.trim().startsWith('```')) {
                closeList();
                if (inCode) {
                    html.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
                    codeLines = [];
                    inCode = false;
                } else {
                    inCode = true;
                }
                index += 1;
                continue;
            }

            if (inCode) {
                codeLines.push(line);
                index += 1;
                continue;
            }

            const nextLine = lines[index + 1] || '';
            if (line.includes('|') && /^\s*\|?\s*:?-{3,}/.test(nextLine)) {
                closeList();
                const headers = splitTableRow(line);
                const rows = [];
                index += 2;
                while (index < lines.length && lines[index].includes('|') && lines[index].trim()) {
                    rows.push(splitTableRow(lines[index]));
                    index += 1;
                }
                html.push('<table><thead><tr>' + headers.map(cell => `<th>${renderInline(cell)}</th>`).join('') + '</tr></thead><tbody>');
                rows.forEach(row => html.push('<tr>' + row.map(cell => `<td>${renderInline(cell)}</td>`).join('') + '</tr>'));
                html.push('</tbody></table>');
                continue;
            }

            const heading = line.match(/^(#{1,3})\s+(.+)$/);
            if (heading) {
                closeList();
                const level = heading[1].length;
                html.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
                index += 1;
                continue;
            }

            const unordered = line.match(/^\s*[-*]\s+(.+)$/);
            const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
            if (unordered || ordered) {
                const desiredList = unordered ? 'ul' : 'ol';
                if (listType !== desiredList) {
                    closeList();
                    listType = desiredList;
                    html.push(`<${listType}>`);
                }
                html.push(`<li>${renderInline((unordered || ordered)[1])}</li>`);
                index += 1;
                continue;
            }

            closeList();
            if (line.trim()) {
                html.push(`<p>${renderInline(line)}</p>`);
            }
            index += 1;
        }

        closeList();
        if (inCode) {
            html.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
        }
        return html.join('');
    }

    function formatTime(timestamp = Date.now()) {
        return new Intl.DateTimeFormat('zh-CN', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        }).format(timestamp);
    }

    function scrollToBottom(behavior = 'smooth') {
        requestAnimationFrame(() => scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior }));
    }

    function createMessage(role, content, options = {}) {
        const row = document.createElement('article');
        row.className = `message-row ${role}`;

        if (role === 'assistant') {
            const avatar = document.createElement('span');
            avatar.className = 'message-avatar';
            avatar.setAttribute('aria-hidden', 'true');
            avatar.innerHTML = renderPersonaAvatar(activePersona);
            row.appendChild(avatar);
        }

        const body = document.createElement('div');
        body.className = 'message-body';
        const meta = document.createElement('div');
        meta.className = 'message-meta';
        meta.textContent = role === 'assistant' ? `${activePersona.displayName} · ${formatTime(options.timestamp)}` : formatTime(options.timestamp);
        const contentElement = document.createElement('div');

        if (role === 'user') {
            contentElement.className = 'user-bubble';
            contentElement.textContent = content;
        } else if (options.error) {
            contentElement.className = 'message-error';
            contentElement.textContent = content;
        } else {
            contentElement.className = 'assistant-content';
            contentElement.innerHTML = renderMarkdown(content);
        }

        body.append(meta, contentElement);
        row.appendChild(body);
        messagesElement.appendChild(row);
        scrollToBottom(options.instant ? 'auto' : 'smooth');
        return contentElement;
    }

    function renderPersonaAvatar(persona) {
        if (!persona) return '<i class="ri-sparkling-2-fill"></i>';
        if (persona.iconUrl && persona.iconUrl.startsWith('http')) {
            return '<img src="' + escapeHtml(persona.iconUrl) + '" alt="" class="avatar-img" onerror="this.remove()">';
        }
        if (persona.iconUrl && persona.iconUrl.startsWith('ri-')) {
            return '<i class="' + escapeHtml(persona.iconUrl) + '"></i>';
        }
        if (persona.iconUrl) {
            return '<span class="avatar-emoji">' + escapeHtml(persona.iconUrl) + '</span>';
        }
        return '<i class="ri-sparkling-2-fill"></i>';
    }

    function parseSseEvent(eventText) {
        const lines = eventText.split(/\r?\n/);
        const dataLines = lines
            .filter(line => line.startsWith('data:'))
            .map(line => line.slice(5).replace(/^ /, ''));
        return dataLines.length ? dataLines.join('\n') : eventText;
    }

    async function readStream(response, onContent) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        const isEventStream = (response.headers.get('content-type') || '').includes('text/event-stream');
        let buffer = '';
        let content = '';

        while (true) {
            const { done, value } = await reader.read();
            buffer += decoder.decode(value || new Uint8Array(), { stream: !done });

            if (isEventStream) {
                const events = buffer.split(/\r?\n\r?\n/);
                buffer = events.pop() || '';
                events.forEach(event => {
                    const parsed = parseSseEvent(event);
                    if (parsed && parsed !== '[DONE]') {
                        content += parsed;
                        onContent(content);
                    }
                });
            } else if (buffer) {
                content += buffer;
                buffer = '';
                onContent(content);
            }

            if (done) break;
        }

        if (buffer.trim()) {
            const parsed = isEventStream ? parseSseEvent(buffer) : buffer;
            if (parsed && parsed !== '[DONE]') {
                content += parsed;
                onContent(content);
            }
        }
        return content;
    }

    function setStreamingState(streaming) {
        isStreaming = streaming;
        sendButton.hidden = streaming;
        stopButton.hidden = !streaming;
        toolButton.disabled = streaming;
        input.disabled = streaming;
        activityElement.hidden = !streaming;
    }

    function autoResizeInput() {
        input.style.height = 'auto';
        input.style.height = `${Math.min(input.scrollHeight, 156)}px`;
    }

    function getSavedConversations() {
        try {
            return JSON.parse(localStorage.getItem(storageKey()) || '[]');
        } catch (error) {
            return [];
        }
    }

    function saveConversation() {
        if (!history.length) return;
        const conversations = getSavedConversations().filter(item => item.id !== conversationId);
        const firstUserMessage = history.find(message => message.role === 'user');
        conversations.unshift({
            id: conversationId,
            title: (firstUserMessage?.content || '新对话').slice(0, 42),
            updatedAt: Date.now(),
            messages: history
        });
        localStorage.setItem(storageKey(), JSON.stringify(conversations.slice(0, 20)));
    }

    function renderHistoryList() {
        const conversations = getSavedConversations();
        historyList.replaceChildren();
        if (!conversations.length) {
            const empty = document.createElement('p');
            empty.className = 'history-empty';
            empty.textContent = '还没有保存的对话';
            historyList.appendChild(empty);
            return;
        }
        conversations.forEach(conversation => {
            const item = document.createElement('button');
            item.type = 'button';
            item.className = 'history-item';
            item.innerHTML = `<span class="history-item-title">${escapeHtml(conversation.title)}</span><span class="history-item-time">${new Intl.DateTimeFormat('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(conversation.updatedAt)}</span>`;
            item.addEventListener('click', () => loadConversation(conversation));
            historyList.appendChild(item);
        });
    }

    function openHistory() {
        renderHistoryList();
        drawerBackdrop.hidden = false;
        historyDrawer.classList.add('open');
        historyDrawer.setAttribute('aria-hidden', 'false');
        closeHistoryButton.focus();
    }

    function closeHistory() {
        historyDrawer.classList.remove('open');
        historyDrawer.setAttribute('aria-hidden', 'true');
        drawerBackdrop.hidden = true;
        historyButton.focus();
    }

    function resetConversation() {
        if (abortController) abortController.abort();
        history = [];
        conversationId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
        messagesElement.replaceChildren();
        welcomeElement.hidden = false;
        setStreamingState(false);
        input.disabled = false;
        input.value = '';
        autoResizeInput();
        input.focus();
        closeHistory();
        scrollArea.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function loadConversation(conversation) {
        history = Array.isArray(conversation.messages) ? conversation.messages : [];
        conversationId = conversation.id;
        messagesElement.replaceChildren();
        welcomeElement.hidden = history.length > 0;
        history.forEach(message => createMessage(message.role, message.content, { instant: true }));
        closeHistory();
        input.focus();
    }

    function usePrompt(prompt, submit = false) {
        input.value = prompt;
        autoResizeInput();
        toolMenu.hidden = true;
        input.focus();
        if (submit) composer.requestSubmit();
    }

    async function sendMessage(text) {
        if (!text || isStreaming) return;
        const requestHistory = history.slice();
        welcomeElement.hidden = true;
        createMessage('user', text);
        history.push({ role: 'user', content: text });
        input.value = '';
        autoResizeInput();
        setStreamingState(true);
        abortController = new AbortController();

        let assistantElement = null;
        let fullContent = '';

        try {
            const requestBody = {
                message: text,
                history: requestHistory,
                persona: activePersona.id,
                sessionId: sessionId
            };
            if (activePersona.id !== 'default') {
                requestBody.personaPrompt = true;
            }
            const response = await fetch('/api/ai-assistant/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody),
                signal: abortController.signal
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || `HTTP ${response.status}`);
            }

            assistantElement = createMessage('assistant', '');
            assistantElement.classList.add('typing');
            activityElement.hidden = true;
            fullContent = await readStream(response, content => {
                assistantElement.innerHTML = renderMarkdown(content);
                scrollToBottom('auto');
            });

            assistantElement.classList.remove('typing');
            history.push({ role: 'assistant', content: fullContent });
            saveConversation();
        } catch (error) {
            activityElement.hidden = true;
            if (error.name === 'AbortError') {
                if (assistantElement) {
                    assistantElement.classList.remove('typing');
                    if (!fullContent) assistantElement.textContent = '已停止生成。';
                }
            } else {
                if (assistantElement) assistantElement.closest('.message-row').remove();
                createMessage('assistant', `[请求失败] ${error.message || '无法连接到 AI 助手'}`, { error: true });
            }
        } finally {
            abortController = null;
            setStreamingState(false);
            input.disabled = false;
            input.focus();
        }
    }

    composer.addEventListener('submit', event => {
        event.preventDefault();
        sendMessage(input.value.trim());
    });

    input.addEventListener('input', autoResizeInput);
    input.addEventListener('keydown', event => {
        if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
            event.preventDefault();
            composer.requestSubmit();
        }
    });

    stopButton.addEventListener('click', () => abortController?.abort());
    newChatButton.addEventListener('click', resetConversation);
    historyButton.addEventListener('click', openHistory);
    closeHistoryButton.addEventListener('click', closeHistory);
    drawerBackdrop.addEventListener('click', closeHistory);

    toolButton.addEventListener('click', () => {
        toolMenu.hidden = !toolMenu.hidden;
        toolButton.setAttribute('aria-expanded', String(!toolMenu.hidden));
    });

    autoOpsTestButton.addEventListener('click', async () => {
        if (!confirm('将测试 RSS、AI、作者和文章创建，并生成一篇不会发布的测试草稿。继续吗？')) return;
        const original = autoOpsTestButton.innerHTML;
        autoOpsTestButton.disabled = true;
        autoOpsTestButton.innerHTML = '<i class="ri-loader-4-line ri-spin"></i><span class="button-label">测试中…</span>';
        try {
            const response = await fetch('/api/ai-assistant/auto-ops/test');
            const result = await response.json();
            if (!response.ok || !result.success) throw new Error(result.error || `HTTP ${response.status}`);
            if (result.results) {
                let msg = '### ✅ 自动运维测试通过\n\n';
                for (const r of result.results) {
                    const icon = r.success ? '✅' : '❌';
                    msg += icon + ' **' + (r.persona || '未知') + '**';
                    if (r.success) {
                        msg += '\n  模式：' + (r.mode || '未知') + ' | 新闻：' + (r.newsCount || 0) + ' 条';
                        msg += '\n  标题：' + (r.title || '未知');
                        msg += '\n  ' + (r.result || '');
                    } else {
                        msg += '\n  ❌ ' + (r.error || '未知错误');
                    }
                    msg += '\n\n';
                }
                createMessage('assistant', msg, { instant: true });
            } else if (result.personas) {
                let msg = '### 🚀 自动运维已启动\n\n';
                msg += result.message + '\n\n';
                msg += '**已启动：** ' + result.personas.join('、') + '\n\n';
                msg += '> ⏳ 各 Persona 正在后台抓取 RSS、调用 AI 生成文章。\n';
                msg += '> 📋 请前往 **文章列表** 查看草稿/已发布文章。\n';
                msg += '> 📝 服务器日志可查看详细执行结果。';
                createMessage('assistant', msg, { instant: true });
            } else if (result.mode) {
                createMessage('assistant', `### ✅ 自动运维测试通过\n\n- 模式：${result.mode}\n- 读取新闻：${result.newsCount} 条\n- 草稿标题：${result.title}\n\n${result.result}`, { instant: true });
            } else {
                createMessage('assistant', `### ✅ 自动运维\n\n${result.message || '已完成，请查看文章列表'}`, { instant: true });
            }
            scrollToBottom();
        } catch (error) {
            createMessage('assistant', `自动运维测试失败：${error.message}`, { error: true, instant: true });
            scrollToBottom();
        } finally {
            autoOpsTestButton.disabled = false;
            autoOpsTestButton.innerHTML = original;
        }
    });

    document.addEventListener('click', event => {
        if (!toolMenu.contains(event.target) && !toolButton.contains(event.target)) {
            toolMenu.hidden = true;
            toolButton.setAttribute('aria-expanded', 'false');
        }
    });

    document.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
            toolMenu.hidden = true;
            if (historyDrawer.classList.contains('open')) closeHistory();
        }
    });

    document.querySelectorAll('[data-prompt]').forEach(button => {
        button.addEventListener('click', () => usePrompt(button.dataset.prompt, button.classList.contains('suggestion')));
    });

    autoResizeInput();

    // ========== Persona Management ==========

    function getPersonaIconHtml(persona) {
        if (!persona) return '<i class="ri-sparkling-2-fill"></i>';
        if (persona.iconUrl && persona.iconUrl.startsWith('http')) {
            return '<img src="' + escapeHtml(persona.iconUrl) + '" alt="" class="avatar-img">';
        }
        if (persona.iconUrl && persona.iconUrl.startsWith('ri-')) {
            return '<i class="' + escapeHtml(persona.iconUrl) + '"></i>';
        }
        if (persona.iconUrl) {
            return '<span class="pi-emoji">' + escapeHtml(persona.iconUrl) + '</span>';
        }
        return '<i class="ri-sparkling-2-fill"></i>';
    }

    async function loadPersonas() {
        if (loadingPersonas) return;
        loadingPersonas = true;
        try {
            const resp = await fetch('/api/ai-assistant/personas');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            personas = data.personas || [];
            // 缓存
            try { localStorage.setItem(PERSONA_LIST_KEY, JSON.stringify(personas)); } catch (e) {}
            // 用 API 数据刷新当前 activePersona
            const match = personas.find(p => p.id === activePersona.id);
            if (match) {
                activePersona.displayName = match.displayName || activePersona.id;
                if (match.iconUrl !== undefined) activePersona.iconUrl = match.iconUrl;
                if (match.brandColor) activePersona.brandColor = match.brandColor;
                if (match.greeting) activePersona.greeting = match.greeting;
            }
            // 尝试恢复之前选中的 persona
            try {
                const savedId = localStorage.getItem('halo-ai-active-persona');
                if (savedId && savedId !== activePersona.id) {
                    const saved = personas.find(p => p.id === savedId);
                    if (saved) { switchPersona(saved); return; }
                }
            } catch(e) {}
            renderPersonaMenu();
            updatePersonaUI();
            // 确保当前 persona 仍存在
            const stillExists = personas.some(p => p.id === activePersona.id);
            if (!stillExists && personas.length > 0) {
                switchPersona(personas[0]);
            }
        } catch (e) {
            console.warn('加载 Persona 列表失败', e);
            // 使用缓存的列表
            try {
                const cached = localStorage.getItem(PERSONA_LIST_KEY);
                if (cached) {
                    personas = JSON.parse(cached);
                    renderPersonaMenu();
            updatePersonaUI();
                }
            } catch (e2) {}
        } finally {
            loadingPersonas = false;
        }
    }

    function renderPersonaMenu() {
        const list = document.getElementById('personaList');
        if (!list) return;
        list.innerHTML = '';
        personas.forEach(p => {
            const item = document.createElement('button');
            item.type = 'button';
            item.className = 'persona-menu-item' + (p.id === activePersona.id ? ' active' : '');
            item.innerHTML = getPersonaIconHtml(p) + '<span>' + escapeHtml(p.displayName || p.id) + '</span>'
                + (p.id === activePersona.id ? '<span class="pi-check"><i class="ri-check-line"></i></span>' : '');
            item.addEventListener('click', () => {
                switchPersona(p);
                closePersonaMenu();
            });
            list.appendChild(item);
        });
    }

    function switchPersona(persona) {
        if (persona.id === activePersona.id) return;
        // 保存当前对话
        saveConversation();
        // 切换 persona
        activePersona = persona;
        // 持久化选中的 persona
        try { localStorage.setItem('halo-ai-active-persona', persona.id); } catch(e) {}
        // 重置对话
        history = [];
        conversationId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
        messagesElement.replaceChildren();
        // 更新 UI
        updatePersonaUI();
        // 加载该 persona 的历史
        loadPersonaConversations();
        // 更新 persona 菜单
        renderPersonaMenu();
    }

    function updatePersonaUI() {
        const icon = getPersonaIconHtml(activePersona);
        // 按钮
        const btnIcon = document.getElementById('personaButtonIcon');
        const btnLabel = document.getElementById('personaButtonLabel');
        if (btnIcon) btnIcon.innerHTML = icon;
        if (btnLabel) btnLabel.textContent = activePersona.displayName || activePersona.id;
        // 欢迎页
        const welcomeAvatar = document.getElementById('welcomeAvatar');
        const welcomeTitle = document.getElementById('welcomeTitle');
        const welcomeSubtitle = document.getElementById('welcomeSubtitle');
        if (welcomeAvatar) welcomeAvatar.innerHTML = icon;
        if (welcomeTitle) welcomeTitle.textContent = activePersona.greeting || ('你好，我是 ' + (activePersona.displayName || 'AI 助手'));
        if (welcomeSubtitle) {
            const descs = {
                'default': '我可以帮你管理博客文章、分类、标签和评论。',
                'munger': '用多元思维模型帮你拆解问题。'
            };
            welcomeSubtitle.textContent = descs[activePersona.id] || '';
        }
        // 设置 brand color CSS 变量
        if (activePersona.brandColor) {
            document.documentElement.style.setProperty('--accent', activePersona.brandColor);
        }
    }

    async function loadPersonaConversations() {
        try {
            const resp = await fetch('/api/ai-assistant/persona/' + encodeURIComponent(activePersona.id) + '/conversations?sessionId=' + encodeURIComponent(sessionId));
            if (!resp.ok) return;
            const data = await resp.json();
            const convs = data.conversations || [];
            // 加载最新的对话
            if (convs.length > 0) {
                try {
                    const convResp = await fetch('/api/ai-assistant/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            persona: activePersona.id,
                            sessionId: sessionId,
                            message: '',
                            history: [],
                            loadConversation: convs[0].id
                        })
                    });
                } catch (e) {}
            }
        } catch (e) {
            console.warn('加载对话历史失败', e);
        }
    }

    function openPersonaMenu() {
        loadPersonas();
        const menu = document.getElementById('personaMenu');
        if (menu) menu.hidden = false;
    }

    function closePersonaMenu() {
        const menu = document.getElementById('personaMenu');
        if (menu) menu.hidden = true;
    }

    function togglePersonaMenu() {
        const menu = document.getElementById('personaMenu');
        if (menu) {
            if (menu.hidden) openPersonaMenu();
            else closePersonaMenu();
        }
    }

    // ========== Session-based conversation save/load ==========

    function saveConversationPerSession() {
        if (!history.length || !sessionId) return;
        // 服务端保存由后端处理，这里只做本地缓存
        try {
            const key = 'halo-ai-session-conv-' + activePersona.id;
            const data = {
                id: conversationId,
                messages: history.slice(-20), // 只缓存最近20轮
                updatedAt: Date.now()
            };
            localStorage.setItem(key, JSON.stringify(data));
        } catch (e) {}
    }

    function loadSessionConversation() {
        try {
            const key = 'halo-ai-session-conv-' + activePersona.id;
            const cached = localStorage.getItem(key);
            if (cached) {
                const data = JSON.parse(cached);
                if (data.messages && data.messages.length > 0) {
                    history = data.messages;
                    conversationId = data.id;
                    messagesElement.replaceChildren();
                    welcomeElement.hidden = history.length > 0;
                    history.forEach(msg => createMessage(msg.role, msg.content, { instant: true }));
                    return true;
                }
            }
        } catch (e) {}
        return false;
    }

    // ========== Init ==========

    // Override saveConversation to be persona-aware
    const _origSaveConversation = saveConversation;
    saveConversation = function() {
        saveConversationPerSession();
        // 也保存到全局历史记录（兼容旧版）
        if (!history.length) return;
        const conversations = getSavedConversations().filter(item => item.id !== conversationId);
        const firstUserMessage = history.find(msg => msg.role === 'user');
        conversations.unshift({
            id: conversationId,
            title: (firstUserMessage?.content || '新对话').slice(0, 42),
            updatedAt: Date.now(),
            messages: history.slice(),
            personaId: activePersona.id
        });
        try {
            localStorage.setItem(storageKey(), JSON.stringify(conversations.slice(0, 20)));
        } catch (e) {}
    };

    // Init
    document.addEventListener('DOMContentLoaded', () => {
        // 先获取登录用户的 session
        fetchServerSession().then(() => {
            // 如果服务端有 session，替换之前 localStorage 生成的 sessionId
            if (serverSessionId) {
                sessionId = serverSessionId;
            }
            // 先加载 Persona 列表（会恢复 localStorage 中保存的角色）
            loadPersonas().then(() => {
                // 此时 activePersona 已正确恢复，再加载服务端对话
                loadServerConversation().then(loaded => {
                    if (!loaded) {
                        // 没有服务端对话时，回退到 localStorage
                        loadSessionConversation();
                    }
                });
            });
        });
    });

    async function loadServerConversation() {
        try {
            const resp = await fetch('/api/ai-assistant/persona/'
                + encodeURIComponent(activePersona.id)
                + '/conversations/current?sessionId=' + encodeURIComponent(sessionId));
            if (!resp.ok) return false;
            const data = await resp.json();
            const msgs = data.messages || [];
            if (msgs.length === 0) return false;
            history = msgs;
            conversationId = data.id;
            messagesElement.replaceChildren();
            welcomeElement.hidden = false;
            msgs.forEach(msg => createMessage(msg.role, msg.content, { instant: true }));
            welcomeElement.hidden = true;
            return true;
        } catch (e) {
            return false;
        }
    }

    const personaButton = document.getElementById('personaButton');
    const personaMenu = document.getElementById('personaMenu');
    const managePersonaButton = document.getElementById('managePersonaButton');

    if (personaButton) {
        personaButton.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePersonaMenu();
        });
    }

    if (managePersonaButton) {
        managePersonaButton.addEventListener('click', () => {
            closePersonaMenu();
            alert('Persona 管理功能即将推出。\n\n你可以通过上传 SKILL.md 文件来创建新的 AI 助手角色。\n目前可通过 Halo 插件后台配置。');
        });
    }

    const uploadContextButton = document.getElementById('uploadContextButton');
    if (uploadContextButton) {
        uploadContextButton.addEventListener('click', () => {
            closePersonaMenu();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.md,.txt,.adoc,.mdx';
            input.addEventListener('change', async () => {
                const file = input.files?.[0];
                if (!file) return;
                if (file.size > 512 * 1024) {
                    alert('文件大小不能超过 512KB');
                    return;
                }
                try {
                    const form = new FormData();
                    form.append('file', file);
                    const resp = await fetch('/api/ai-assistant/persona/' + encodeURIComponent(activePersona.id) + '/context', {
                        method: 'POST',
                        body: form
                    });
                    if (resp.ok) {
                        alert('上下文已上传成功！\n刷新页面后新对话将包含该上下文。');
                    } else {
                        const err = await resp.json().catch(() => ({}));
                        alert('上传失败: ' + (err.error || resp.statusText));
                    }
                } catch (e) {
                    alert('上传失败: ' + e.message);
                }
            });
            input.click();
        });
    }

    // Click outside to close menu
    document.addEventListener('click', (e) => {
        if (personaMenu && !personaMenu.hidden) {
            const selector = document.querySelector('.persona-selector');
            if (selector && !selector.contains(e.target)) {
                closePersonaMenu();
            }
        }
    });

</script>
</body>
