apiVersion: v1alpha1
kind: Setting
metadata:
  name: ai-assistant-settings
spec:
  forms:
    - group: basic
      label: 基本配置
      formSchema:
        - $formkit: text
          name: apiEndpoint
          label: Base URL（API 端点）
          value: "https://api.deepseek.com"
          help: "OpenAI 兼容接口地址，如 https://api.deepseek.com 或 https://api.openai.com/v1"
        - $formkit: password
          name: apiKey
          label: API Key
          help: "填入你的 API Key"
        - $formkit: text
          name: model
          label: 模型名称
          value: "deepseek-v4-flash"
          help: "如 deepseek-chat、gpt-4o-mini 等"
        - $formkit: number
          name: maxTokens
          label: 最大 Token 数
          value: 8192
          help: "每次对话的最大 Token 数"
        - $formkit: textarea
          name: systemPrompt
          label: 系统提示词
          value: |-
            你是一个智能博客助手，可以帮助用户管理博客。
            你可以执行以下操作：
            - 查看文章列表、创建文章、更新文章、删除文章
            - 管理分类和标签
            - 查看和管理评论
            请用友好的语气与用户交流。
          help: "AI 助手的系统提示词，可自定义"
        - $formkit: text
          name: pageTitle
          label: 页面标题
          value: "老巫师"
          help: "浏览器标签页和页面顶部的品牌名称"
        - $formkit: text
          name: pageIcon
          label: 页面图标
          value: "ri-sparkling-2-fill"
          help: "左上角品牌图标，Emoji 或 Remix 图标类名（如 ri-sparkling-2-fill）"
        - $formkit: text
          name: greeting
          label: 欢迎语
          value: "你好，我是老巫师，巫师前沿站的AI助手"
          help: "页面打开时显示的欢迎标题"
    - group: push
      label: 每日推送
      formSchema:
        - $formkit: text
          name: pushSecret
          label: 推送密钥
          help: "调用推送 API 时需要携带的密钥，防止滥用"
          value: ""
        - $formkit: select
          name: pushChannel
          label: 推送渠道
          value: "serverchan"
          options:
            - label: "Server酱"
              value: "serverchan"
            - label: "PushPlus"
              value: "pushplus"
        - $formkit: password
          name: pushToken
          label: 推送 Token
          help: "Server酱 SendKey 或 PushPlus Token"
        - $formkit: select
          name: pushTime
          label: 推送时段
          value: "today"
          options:
            - label: "今日文章"
              value: "today"
            - label: "昨日文章"
              value: "yesterday"
            - label: "今日+昨日"
              value: "both"
    - group: autoOps
      label: 自动运维
      formSchema:
        # ═══ 通用设置 ═══
        - $formkit: switch
          name: enabled
          label: 全局启用
          value: false
          help: "关闭后所有 Persona 都不会执行"
        - $formkit: text
          name: runTime
          label: 每日执行时间
          value: "08:30"
          help: "24 小时制，例如 08:30"
        - $formkit: text
          name: timezone
          label: 时区
          value: "Asia/Shanghai"
        # ═══ 第一人物：巫师前沿站 ═══
        - $formkit: switch
          name: autoPublish
          label: 巫师前沿站 - 自动发布
          value: true
          help: "关闭时仅生成草稿"
        - $formkit: text
          name: authorName
          label: 巫师前沿站 - 作者昵称
          value: "巫师前沿站"
        - $formkit: text
          name: authorUsername
          label: 巫师前沿站 - 作者用户名
          value: "wizard-frontier"
          help: "插件会自动创建一个禁止登录的专属作者"
        - $formkit: textarea
          name: primaryRssSources
          label: 巫师前沿站 - 主要 RSS 源
          value: |-
            https://hnrss.org/frontpage
            https://feeds.arstechnica.com/arstechnica/index
          help: "高优先级来源，头条/重点内容优先选取，每行一个 URL"
        - $formkit: textarea
          name: rssSources
          label: 巫师前沿站 - 次要 RSS 源
          value: |-
            https://github.blog/changelog/feed/
            https://blog.cloudflare.com/rss/
            https://openai.com/news/rss.xml
            https://blog.google/technology/ai/rss/
          help: "补充内容来源，每行一个 URL"
        - $formkit: text
          name: topics
          label: 巫师前沿站 - 关注方向
          value: "人工智能, 大模型, 开源软件, 云计算, 开发工具, 网络安全"
        - $formkit: text
          name: defaultTags
          label: 巫师前沿站 - 文章标签
          value: "AI前沿"
          help: "多个标签用逗号分隔"
        - $formkit: number
          name: maxNewsItems
          label: 巫师前沿站 - 新闻数量上限
          value: 8
          min: 1
          max: 20
        - $formkit: number
          name: maxTokens
          label: 巫师前沿站 - 输出 Token 上限
          value: 3000
          min: 500
          max: 8000
        # ═══ 第二人物：书虫漫步 ═══
        - $formkit: switch
          name: secondaryEnabled
          label: 书虫漫步 - 启用
          value: false
          help: "开启后将生成跨学科知识卡片与好书核心观点提炼"
        - $formkit: text
          name: secondaryAuthorName
          label: 书虫漫步 - 作者昵称
          value: "书虫漫步"
        - $formkit: text
          name: secondaryAuthorUsername
          label: 书虫漫步 - 作者用户名
          value: "bookworm-wanderer"
          help: "插件会自动创建一个禁止登录的专属作者"
        - $formkit: textarea
          name: secondaryRssSources
          label: 书虫漫步 - RSS 来源
          value: |-
            https://aeon.co/feed.rss
            https://www.quantamagazine.org/feed/
            https://fs.blog/feed/
            https://www.themarginalian.org/feed/
            https://nautil.us/feed/
          help: "每行一个 RSS/Atom 地址，建议科普、跨学科、思维模型类源"
        - $formkit: text
          name: secondaryTopics
          label: 书虫漫步 - 关注方向
          value: "科学, 心理学, 思维模型, 历史, 哲学, 商业认知"
        - $formkit: text
          name: secondaryTags
          label: 书虫漫步 - 文章标签
          value: "知识卡片, 好书快读"
          help: "多个标签用逗号分隔，建议知识卡片/好书快读等"
        - $formkit: number
          name: secondaryMaxNewsItems
          label: 书虫漫步 - 新闻数量上限
          value: 5
          min: 1
          max: 20
        - $formkit: number
          name: secondaryMaxTokens
          label: 书虫漫步 - 输出 Token 上限
          value: 3000
          min: 500
          max: 8000
        # ═══ 第三人物：技术猎手 ═══
        - $formkit: switch
          name: tertiaryEnabled
          label: 技术猎手 - 启用
          value: false
          help: "开启后将使用独立的 RSS 源，生成技术深度文章"
        - $formkit: text
          name: tertiaryAuthorName
          label: 技术猎手 - 作者昵称
          value: "技术猎手"
        - $formkit: text
          name: tertiaryAuthorUsername
          label: 技术猎手 - 作者用户名
          value: "tech-hunter"
          help: "插件会自动创建一个禁止登录的专属作者"
        - $formkit: textarea
          name: tertiaryRssSources
          label: 技术猎手 - RSS 来源
          value: |-
            http://highscalability.com/blog/atom.xml
            https://martinfowler.com/feed.atom
            https://blog.pragmaticengineer.com/rss/
            https://blog.bytebytego.com/feed
            https://blog.quastor.org/feed.xml
          help: "每行一个 RSS/Atom 地址，建议系统设计、架构、工程实践类源"
        - $formkit: text
          name: tertiaryTopics
          label: 技术猎手 - 关注方向
          value: "系统设计, 数据结构与算法, 后端架构, 性能优化, 最佳实践, 开源项目"
        - $formkit: text
          name: tertiaryTags
          label: 技术猎手 - 文章标签
          value: "技术干货, 优质译文"
          help: "多个标签用逗号分隔"
        - $formkit: number
          name: tertiaryMaxNewsItems
          label: 技术猎手 - 新闻数量上限
          value: 5
          min: 1
          max: 20
        - $formkit: number
          name: tertiaryMaxTokens
          label: 技术猎手 - 输出 Token 上限
          value: 3000
          min: 500
          max: 8000
