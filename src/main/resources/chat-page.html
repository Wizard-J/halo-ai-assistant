<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>AI 智能助手</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css">
    <style>

        /* === Safari 兼容性修复 === */
        /* 确保 hidden 属性在所有浏览器都生效 */
        [hidden] { display: none !important; }

        /* Safari 移动端 100vh 修正 */
        html, body { height: 100%; height: 100dvh; min-height: 100dvh; }

        /* Safari flexbox gap fallback */
        @supports not (gap: 10px) {
            .messages { margin-bottom: 32px; }
            .messages > * + * { margin-top: 32px; }
            .suggestions > * + * { margin-left: 10px; margin-top: 10px; }
            .message-row > * + * { margin-left: 13px; }
        }

        :root {
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #eff6ff;
            --surface: #ffffff;
            --surface-subtle: #f8fafc;
            --surface-raised: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --text-faint: #94a3b8;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --success: #16a34a;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
            --shadow-menu: 0 16px 36px rgba(15, 23, 42, 0.12);
            --shadow-soft: 0 10px 28px rgba(15, 23, 42, 0.08);
            --content-width: 820px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --accent: #60a5fa;
                --accent-hover: #93c5fd;
                --accent-soft: #172554;
                --surface: #0b1120;
                --surface-subtle: #111827;
                --surface-raised: #172033;
                --text: #f8fafc;
                --text-muted: #a8b3c7;
                --text-faint: #758198;
                --border: #253047;
                --border-strong: #3a4964;
                --success: #4ade80;
                --danger: #f87171;
                --danger-soft: #3f161c;
                --shadow-menu: 0 18px 40px rgba(0, 0, 0, 0.42);
                --shadow-soft: 0 14px 32px rgba(0, 0, 0, 0.28);
            }
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--surface);
            color: var(--text);
            font-family: Inter, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        button,
        textarea {
            font: inherit;
        }

        button {
            color: inherit;
        }

        button:focus-visible,
        textarea:focus-visible {
            outline: 3px solid color-mix(in srgb, var(--accent) 24%, transparent);
            outline-offset: 2px;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--surface);
        }

        .app-header {
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 0;
            min-height: 58px;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--surface) 94%, transparent);
            backdrop-filter: blur(16px);
        }

        .brand,
        .header-actions,
        .connection {
            display: flex;
            align-items: center;
        }

        .brand {
            min-width: 0;
            gap: 12px;
        }

        .brand-mark,
        .assistant-avatar {
            display: grid;
            flex: 0 0 auto;
            place-items: center;
            border-radius: 50%;
            background: var(--accent);
            color: #ffffff;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            font-size: 18px;
        }

        .brand-copy {
            display: flex;
            align-items: baseline;
            min-width: 0;
            gap: 10px;
        }

        .brand-title {
            overflow: hidden;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .connection {
            gap: 7px;
            color: var(--text-muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .connection-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
        }

        .header-actions {
            gap: 8px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            gap: 7px;
            padding: 0 13px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-raised);
            color: var(--text);
            cursor: pointer;
            box-shadow: 0 1px 0 color-mix(in srgb, var(--surface) 80%, transparent);
            transition: border-color 160ms ease, background 160ms ease, color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
        }

        .button:hover {
            border-color: var(--border-strong);
            background: var(--surface-subtle);
            box-shadow: 0 4px 12px color-mix(in srgb, var(--text) 8%, transparent);
        }

        .button:active {
            transform: translateY(1px);
        }

        .button-primary {
            border-color: var(--accent);
            background: var(--accent);
            color: #ffffff;
        }

        .button-primary:hover {
            border-color: var(--accent-hover);
            background: var(--accent-hover);
        }

        .button-icon {
            width: 38px;
            padding: 0;
            font-size: 18px;
        }

        .workspace {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .conversation {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .scroll-area { flex: 1;
            min-height: 0;
            overflow-y: auto;
            overscroll-behavior: contain;
            scrollbar-gutter: stable;
        }

        .content-column {
            width: min(calc(100% - 48px), var(--content-width));
            margin: 0 auto;
            padding: 48px 0 32px;
        }

        .welcome {
            padding: 0 40px 42px;
        }

        .welcome-heading {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .assistant-avatar {
            width: 42px;
            height: 42px;
            font-size: 21px;
        }

        .welcome h1 {
            margin: 0 0 5px;
            font-size: 26px;
            line-height: 1.25;
            letter-spacing: 0;
        }

        .welcome p {
            margin: 0;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 24px;
            padding-left: 58px;
        }

        .suggestion {
            display: inline-flex;
            align-items: center;
            min-height: 42px;
            gap: 8px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
        }

        .suggestion i {
            color: var(--accent);
            font-size: 17px;
        }

        .suggestion:hover {
            border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
            background: var(--accent-soft);
            color: var(--accent);
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .message-row {
            display: flex;
            align-items: flex-start;
            gap: 13px;
        }

        .message-row.user {
            justify-content: flex-end;
            padding-left: 20%;
        }

        .message-row.assistant {
            padding-right: 8%;
        }

        .avatar-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; vertical-align: middle; }
        .avatar-emoji { font-size: 20px; line-height: 1; }
        .message-avatar img,
        .assistant-avatar img,
        .welcome-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .message-avatar {
            display: grid;
            flex: 0 0 auto;
            width: 30px;
            height: 30px;
            place-items: center;
            margin-top: 1px;
            border-radius: 50%;
            background: var(--accent);
            color: #ffffff;
            font-size: 15px;
        }

        .message-body {
            min-width: 0;
            max-width: 100%;
        }

        .message-meta {
            margin-bottom: 6px;
            color: var(--text-faint);
            font-size: 12px;
        }

        .user-bubble {
            max-width: min(620px, 100%);
            padding: 10px 14px;
            border-radius: 8px 8px 3px 8px;
            background: var(--accent);
            color: #ffffff;
            line-height: 1.55;
            box-shadow: 0 8px 22px color-mix(in srgb, var(--accent) 22%, transparent);
            white-space: pre-wrap;
        }

        .assistant-content {
            color: var(--text);
            font-size: 15px;
            line-height: 1.78;
            overflow-wrap: anywhere;
        }

        .assistant-content.typing::after {
            content: "";
            display: inline-block;
            width: 2px;
            height: 1.05em;
            margin-left: 3px;
            vertical-align: -2px;
            background: var(--accent);
            animation: blink 900ms steps(1) infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 1ms !important;
            }
        }

        .assistant-content h1,
        .assistant-content h2,
        .assistant-content h3 {
            margin: 22px 0 10px;
            line-height: 1.35;
            letter-spacing: 0;
        }

        .assistant-content h1 { font-size: 21px; }
        .assistant-content h2 { font-size: 18px; }
        .assistant-content h3 { font-size: 16px; }

        .assistant-content p {
            margin: 0 0 12px;
        }

        .assistant-content ul,
        .assistant-content ol {
            margin: 8px 0 15px;
            padding-left: 23px;
        }

        .assistant-content li {
            margin: 5px 0;
        }

        .assistant-content code {
            padding: 2px 5px;
            border-radius: 5px;
            background: var(--surface-subtle);
            color: var(--accent);
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 0.9em;
        }

        .assistant-content pre {
            overflow-x: auto;
            margin: 14px 0;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-subtle);
        }

        .assistant-content pre code {
            padding: 0;
            background: transparent;
            color: var(--text);
        }

        .assistant-content a {
            color: var(--accent);
            text-underline-offset: 3px;
        }

        .assistant-content table {
            width: 100%;
            margin: 14px 0;
            border-collapse: collapse;
            font-size: 14px;
        }

        .assistant-content th,
        .assistant-content td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        .assistant-content th {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 650;
        }

        .message-error {
            padding: 12px 14px;
            border: 1px solid color-mix(in srgb, var(--danger) 28%, var(--border));
            border-radius: 8px;
            background: var(--danger-soft);
            color: var(--danger);
            line-height: 1.55;
        }

        .activity {
            display: flex;
            align-items: center;
            width: fit-content;
            gap: 9px;
            margin: 18px 0 0 43px;
            padding: 8px 11px;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .activity[hidden] {
            display: none;
        }

        .activity-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border-strong);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 750ms linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .composer-zone {
            position: relative;
            z-index: 10;
            padding: 14px 20px 16px;
            border-top: 1px solid var(--border);
            background: color-mix(in srgb, var(--surface) 94%, transparent);
            backdrop-filter: blur(18px);
        }

        .composer-wrap {
            position: relative;
            width: min(100%, var(--content-width));
            margin: 0 auto;
        }

        .composer {
            display: flex;
            align-items: flex-end;
            gap: 9px;
        }

        .composer-box {
            display: flex;
            flex: 1;
            align-items: flex-end;
            min-width: 0;
            gap: 8px;
            padding: 7px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            background: var(--surface-raised);
            box-shadow: var(--shadow-soft);
            transition: border-color 160ms ease, box-shadow 160ms ease;
        }

        .composer-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
        }

        .composer textarea {
            flex: 1;
            min-height: 38px;
            max-height: 156px;
            padding: 8px 5px;
            resize: none;
            overflow-y: auto;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--text);
            line-height: 1.55;
        }

        .composer textarea::placeholder {
            color: var(--text-faint);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .send-button,
        .stop-button {
            width: 38px;
            height: 38px;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
        }

        .send-button {
            background: var(--accent);
            color: #ffffff;
            font-size: 18px;
        }

        .send-button:hover {
            background: var(--accent-hover);
        }

        .send-button:disabled {
            background: var(--border-strong);
            cursor: not-allowed;
        }

        .stop-button {
            border: 1px solid color-mix(in srgb, var(--danger) 35%, var(--border));
            background: var(--surface);
            color: var(--danger);
            font-size: 17px;
        }

        .stop-button[hidden],
        .send-button[hidden] {
            display: none;
        }

        .composer-hint {
            margin: 7px 0 0 50px;
            color: var(--text-faint);
            font-size: 11px;
        }

        .tool-menu {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 0;
            display: grid;
            width: 260px;
            padding: 7px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-raised);
            box-shadow: var(--shadow-menu);
        }

        .tool-menu[hidden] {
            display: none;
        }

        .tool-menu button {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 0;
            border-radius: 7px;
            background: transparent;
            color: var(--text);
            text-align: left;
            cursor: pointer;
        }

        .tool-menu button:hover {
            background: var(--surface-subtle);
        }

        .tool-menu i {
            color: var(--accent);
            font-size: 17px;
        }

        .drawer-backdrop {
            position: fixed;
            z-index: 40;
            inset: 0;
            background: rgba(15, 23, 42, 0.24);
        }

        .drawer-backdrop[hidden] {
            display: none;
        }

        .history-drawer {
            position: fixed;
            z-index: 50;
            top: 0;
            right: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            width: min(380px, 90vw);
            height: 100%;
            border-left: 1px solid var(--border);
            background: var(--surface);
            box-shadow: var(--shadow-menu);
            transform: translateX(100%);
            transition: transform 220ms ease;
        }

        .history-drawer.open {
            transform: translateX(0);
        }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 58px;
            padding: 0 18px 0 22px;
            border-bottom: 1px solid var(--border);
        }

        .drawer-header h2 {
            margin: 0;
            font-size: 17px;
        }

        .history-list {
            overflow-y: auto;
            padding: 12px;
        }

        .history-empty {
            margin: 0;
            padding: 38px 18px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
        }

        .history-item-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid transparent;
            transition: border-color 140ms ease, background 140ms ease;
        }
        .history-item-wrap:hover {
            border-color: var(--border);
            background: var(--surface-subtle);
        }
        .history-item {
            flex: 1;
            min-width: 0;
            padding: 12px 10px 12px 12px;
            border: 0;
            border-radius: 7px;
            background: transparent;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            font: inherit;
        }
        .history-item:hover {
            background: transparent;
        }

        .persona-manager-drawer {
            width: min(640px, 94vw);
            max-width: 640px;
        }

        .persona-manager-body {
            overflow-y: auto;
            padding: 16px;
            max-height: calc(100vh - 58px);
            background: var(--surface-subtle);
        }

        .persona-upload-panel,
        .persona-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-raised);
            box-shadow: 0 1px 0 color-mix(in srgb, var(--text) 4%, transparent);
        }

        .persona-upload-panel {
            padding: 14px;
            margin-bottom: 14px;
        }

        .persona-upload-panel input[type="file"] {
            width: 100%;
            min-width: 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .persona-upload-title,
        .persona-card-title {
            margin: 0;
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .persona-upload-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(180px, 0.6fr);
            gap: 10px;
            margin-top: 12px;
        }

        .persona-card {
            overflow: hidden;
            margin-bottom: 12px;
        }

        .persona-card-header {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 14px 14px 12px;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--surface-raised) 88%, var(--surface-subtle));
        }

        .persona-card-icon {
            display: grid;
            width: 38px;
            height: 38px;
            place-items: center;
            overflow: hidden;
            border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--border));
            border-radius: 50%;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 21px;
        }

        .persona-card-icon img,
        .persona-card-icon .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .persona-card-meta {
            min-width: 0;
        }

        .persona-card-id {
            overflow: hidden;
            margin-top: 3px;
            color: var(--text-muted);
            font-size: 12px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .persona-badge {
            display: inline-flex;
            align-items: center;
            min-height: 22px;
            padding: 0 8px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--surface);
            color: var(--text-muted);
            font-size: 12px;
            white-space: nowrap;
        }

        .persona-card-body {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            padding: 14px;
        }

        .persona-field {
            display: grid;
            gap: 6px;
            min-width: 0;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
        }

        .persona-field-wide {
            grid-column: 1 / -1;
        }

        .persona-field input,
        .persona-field textarea,
        .persona-upload-panel input[type="text"] {
            width: 100%;
            min-height: 36px;
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            font: inherit;
            font-size: 13px;
        }

        .persona-field textarea {
            resize: vertical;
            line-height: 1.5;
        }

        .persona-color-row {
            display: grid;
            grid-template-columns: 38px minmax(0, 1fr);
            gap: 8px;
            align-items: center;
        }

        .persona-color-swatch {
            width: 38px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--persona-color, var(--accent));
        }

        .persona-card-footer,
        .persona-upload-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .persona-upload-actions {
            grid-column: 1 / -1;
        }

        .persona-card-footer {
            justify-content: space-between;
            padding: 12px 14px 14px;
            border-top: 1px solid var(--border);
        }

        .persona-status {
            min-height: 18px;
            color: var(--success);
            font-size: 12px;
            text-align: right;
        }

        .persona-danger-button {
            color: var(--danger);
        }

        .persona-danger-button i,
        .persona-card-footer i,
        .persona-upload-actions i {
            font-size: 16px;
        }

        @media (max-width: 720px) {
            .persona-upload-grid,
            .persona-card-body {
                grid-template-columns: 1fr;
            }

            .persona-card-header {
                grid-template-columns: auto minmax(0, 1fr);
            }

            .persona-card-header .persona-danger-button,
            .persona-card-header .persona-badge {
                grid-column: 1 / -1;

<script>
    // Persona-aware storage keys
    const SESSION_KEY = 'halo-ai-session-v1';
    function storageKey() { return 'halo-ai-conv-' + activePersona.id + '-v1'; }
    const PERSONA_LIST_KEY = 'halo-ai-personas-v1';
    const ACTIVE_PERSONA_KEY = 'halo-ai-active-persona';
    const scrollArea = document.getElementById('scrollArea');
    const messagesElement = document.getElementById('messages');
    const welcomeElement = document.getElementById('welcome');
    const activityElement = document.getElementById('activity');
    const composer = document.getElementById('composer');
    const input = document.getElementById('input');
    const sendButton = document.getElementById('sendButton');
    const stopButton = document.getElementById('stopButton');
    const toolButton = document.getElementById('toolButton');
    const autoOpsTestButton = document.getElementById('autoOpsTestButton');
    const toolMenu = document.getElementById('toolMenu');
    const historyButton = document.getElementById('historyButton');
    const newChatButton = document.getElementById('newChatButton');
    const historyDrawer = document.getElementById('historyDrawer');
    const historyList = document.getElementById('historyList');
    const drawerBackdrop = document.getElementById('drawerBackdrop');
    const closeHistoryButton = document.getElementById('closeHistoryButton');

    let activePersona = { id: 'default', displayName: 'AI 智能助手', iconUrl: null, brandColor: '#2563eb', greeting: '你好，我是 Halo AI 智能助手', thinkingPhrases: '[]' };
    let personas = [];
    let loadingPersonas = false;
    let thinkingTimer = null;
    let currentThinkingIdx = 0;
    let history = [];
    let conversationId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
    // 会话 ID：优先用服务端登录用户，无登录时回退到 localStorage
    let serverSessionId = null;
    let serverFetchDone = false;

    let sessionId = getOrCreateSessionId();
    let isStreaming = false;

    function persistPersonaCache() {
        try { localStorage.setItem(PERSONA_LIST_KEY, JSON.stringify(personas)); } catch (e) {}
    }

    function upsertPersona(persona) {
        if (!persona || !persona.id) return;
        const idx = personas.findIndex(p => p.id === persona.id);
        if (idx >= 0) personas[idx] = persona;
        else personas.push(persona);
        if (activePersona.id === persona.id) activePersona = persona;
        persistPersonaCache();
        renderPersonaMenu();
        updatePersonaUI();
    }
    let abortController = null;

    async function fetchServerSession() {
        if (serverFetchDone) return;
        serverFetchDone = true;
        try {
            const resp = await fetch('/api/ai-assistant/me');
            if (resp.ok) {
                const data = await resp.json();
                if (data.authenticated && data.sessionId) {
                    serverSessionId = data.sessionId;
                    // 持久化到 localStorage，刷新页面时优先使用（即使服务端还没响应）
                    try { localStorage.setItem(SESSION_KEY, serverSessionId); } catch(e) {}
                }
            }
        } catch (e) { /* 静默失败，回退到 localStorage */ }
    }

    function getOrCreateSessionId() {
        // 优先使用服务端 session
        if (serverSessionId) {
            try { localStorage.setItem(SESSION_KEY, serverSessionId); } catch(e) {}
            return serverSessionId;
        }
        // 回退：localStorage 持久化
        try {
            let sid = localStorage.getItem(SESSION_KEY);
            if (!sid) {
                sid = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + '-' + Math.random().toString(36).slice(2, 10);
                localStorage.setItem(SESSION_KEY, sid);
            }
            return sid;
        } catch (e) { return ''; }
    }

    function escapeHtml(value) {
        return value
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function renderInline(value) {
        return escapeHtml(value)
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
            .replace(/\[([^\]]+)]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    function splitTableRow(line) {
        return line.trim().replace(/^\||\|$/g, '').split('|').map(cell => cell.trim());
    }

    function renderMarkdown(source) {
        const lines = source.replace(/\r\n/g, '\n').split('\n');
        const html = [];
        let index = 0;
        let listType = null;
        let inCode = false;
        let codeLines = [];

        function closeList() {
            if (listType) {
                html.push(`</${listType}>`);
                listType = null;
            }
        }

        while (index < lines.length) {
            const line = lines[index];

            if (line.trim().startsWith('```')) {
                closeList();
                if (inCode) {
                    html.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
                    codeLines = [];
                    inCode = false;
                } else {
                    inCode = true;
                }
                index += 1;
                continue;
            }

            if (inCode) {
                codeLines.push(line);
                index += 1;
                continue;
            }

            const nextLine = lines[index + 1] || '';
            if (line.includes('|') && /^\s*\|?\s*:?-{3,}/.test(nextLine)) {
                closeList();
                const headers = splitTableRow(line);
                const rows = [];
                index += 2;
                while (index < lines.length && lines[index].includes('|') && lines[index].trim()) {
                    rows.push(splitTableRow(lines[index]));
                    index += 1;
                }
                html.push('<table><thead><tr>' + headers.map(cell => `<th>${renderInline(cell)}</th>`).join('') + '</tr></thead><tbody>');
                rows.forEach(row => html.push('<tr>' + row.map(cell => `<td>${renderInline(cell)}</td>`).join('') + '</tr>'));
                html.push('</tbody></table>');
                continue;
            }

            const heading = line.match(/^(#{1,3})\s+(.+)$/);
            if (heading) {
                closeList();
                const level = heading[1].length;
                html.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
                index += 1;
                continue;
            }

            const unordered = line.match(/^\s*[-*]\s+(.+)$/);
            const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
            if (unordered || ordered) {
                const desiredList = unordered ? 'ul' : 'ol';
                if (listType !== desiredList) {
                    closeList();
                    listType = desiredList;
                    html.push(`<${listType}>`);
                }
                html.push(`<li>${renderInline((unordered || ordered)[1])}</li>`);
                index += 1;
                continue;
            }

            closeList();
            if (line.trim()) {
                html.push(`<p>${renderInline(line)}</p>`);
            }
            index += 1;
        }

        closeList();
        if (inCode) {
            html.push(`<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`);
        }
        return html.join('');
    }

    function formatTime(timestamp = Date.now()) {
        return new Intl.DateTimeFormat('zh-CN', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        }).format(timestamp);
    }

    function scrollToBottom(behavior = 'smooth') {
        requestAnimationFrame(() => scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior }));
    }

    function createMessage(role, content, options = {}) {
        const row = document.createElement('article');
        row.className = `message-row ${role}`;

        if (role === 'assistant') {
            const avatar = document.createElement('span');
            avatar.className = 'message-avatar';
            avatar.setAttribute('aria-hidden', 'true');
            avatar.innerHTML = renderPersonaAvatar(activePersona);
            row.appendChild(avatar);
        }

        const body = document.createElement('div');
        body.className = 'message-body';
        const meta = document.createElement('div');
        meta.className = 'message-meta';
        meta.textContent = role === 'assistant' ? `${activePersona.displayName} · ${formatTime(options.timestamp)}` : formatTime(options.timestamp);
        const contentElement = document.createElement('div');

        if (role === 'user') {
            contentElement.className = 'user-bubble';
            contentElement.textContent = content;
        } else if (options.error) {
            contentElement.className = 'message-error';
            contentElement.textContent = content;
        } else {
            contentElement.className = 'assistant-content';
            contentElement.innerHTML = renderMarkdown(content);
        }

        body.append(meta, contentElement);
        row.appendChild(body);
        messagesElement.appendChild(row);
        scrollToBottom(options.instant ? 'auto' : 'smooth');
        return contentElement;
    }

    function renderPersonaAvatar(persona) {
        if (!persona) return '<i class="ri-sparkling-2-fill"></i>';
        if (persona.iconUrl && persona.iconUrl.startsWith('http')) {
            return '<img src="' + escapeHtml(persona.iconUrl) + '" alt="" class="avatar-img" onerror="this.remove()">';
        }
        if (persona.iconUrl && persona.iconUrl.startsWith('ri-')) {
            return '<i class="' + escapeHtml(persona.iconUrl) + '"></i>';
        }
        if (persona.iconUrl) {
            return '<span class="avatar-emoji">' + escapeHtml(persona.iconUrl) + '</span>';
        }
        return '<i class="ri-sparkling-2-fill"></i>';
    }

    function parseSseEvent(eventText) {
        const lines = eventText.split(/\r?\n/);
        const dataLines = lines
            .filter(line => line.startsWith('data:'))
            .map(line => line.slice(5).replace(/^ /, ''));
        return dataLines.length ? dataLines.join('\n') : eventText;
    }

    async function readStream(response, onContent) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        const isEventStream = (response.headers.get('content-type') || '').includes('text/event-stream');
        let buffer = '';
        let content = '';

        while (true) {
            const { done, value } = await reader.read();
            buffer += decoder.decode(value || new Uint8Array(), { stream: !done });

            if (isEventStream) {
                const events = buffer.split(/\r?\n\r?\n/);
                buffer = events.pop() || '';
                events.forEach(event => {
                    const parsed = parseSseEvent(event);
                    if (parsed && parsed !== '[DONE]') {
                        content += parsed;
                        onContent(content);
                    }
                });
            } else if (buffer) {
                content += buffer;
                buffer = '';
                onContent(content);
            }

            if (done) break;
        }

        if (buffer.trim()) {
            const parsed = isEventStream ? parseSseEvent(buffer) : buffer;
            if (parsed && parsed !== '[DONE]') {
                content += parsed;
                onContent(content);
            }
        }
        return content;
    }

    function isLoginResponse(response) {
        const contentType = response.headers.get('content-type') || '';
        const url = response.url || '';
        if (response.status === 401 || response.status === 403) return true;
        if (response.redirected && url.includes('/login')) return true;
        return contentType.includes('text/html');
    }

    function looksLikeLoginHtml(text) {
        if (!text) return false;
        const sample = text.slice(0, 1000).toLowerCase();
        return sample.includes('<!doctype html')
            || sample.includes('<html')
            || sample.includes('authentication_required')
            || sample.includes('/login');
    }

    async function readRequestError(response) {
        if (isLoginResponse(response)) {
            return '登录状态已过期，请重新登录后再试。';
        }
        const errorText = await response.text();
        if (looksLikeLoginHtml(errorText)) {
            return '登录状态已过期，请重新登录后再试。';
        }
        return errorText || `HTTP ${response.status}`;
    }

    function throwIfLoginResponse(response) {
        if (!isLoginResponse(response)) return;
        const error = new Error('登录状态已过期，请重新登录后再试。');
        error.authExpired = true;
        throw error;
    }

    function getThinkingPhrases() {
        try {
            if (activePersona && activePersona.thinkingPhrases) {
                const phrases = JSON.parse(activePersona.thinkingPhrases);
                if (Array.isArray(phrases) && phrases.length > 0) return phrases;
            }
        } catch(e) {}
        return [];
    }

    function cycleThinkingPhrase() {
        const phrases = getThinkingPhrases();
        if (!phrases.length) {
            activityElement.querySelector('span:last-child').textContent = '正在连接 AI 服务…';
            return;
        }
        currentThinkingIdx = (currentThinkingIdx + 1) % phrases.length;
        activityElement.querySelector('span:last-child').textContent = phrases[currentThinkingIdx];
    }

    function startThinkingAnimation() {
        currentThinkingIdx = -1;
        cycleThinkingPhrase();
        thinkingTimer = setInterval(cycleThinkingPhrase, 2200);
    }

    function stopThinkingAnimation() {
        if (thinkingTimer) { clearInterval(thinkingTimer); thinkingTimer = null; }
    }

    function setStreamingState(streaming) {
        isStreaming = streaming;
        sendButton.hidden = streaming;
        stopButton.hidden = !streaming;
        toolButton.disabled = streaming;
        input.disabled = streaming;
        activityElement.hidden = !streaming;
        if (streaming) {
            startThinkingAnimation();
        } else {
            stopThinkingAnimation();
        }
    }

    function autoResizeInput() {
        input.style.height = 'auto';
        input.style.height = `${Math.min(input.scrollHeight, 156)}px`;
    }

    function getSavedConversations() {
        try {
            return JSON.parse(localStorage.getItem(storageKey()) || '[]');
        } catch (error) {
            return [];
        }
    }

    function saveConversation() {
        if (!history.length) return;
        const conversations = getSavedConversations().filter(item => item.id !== conversationId);
        const firstUserMessage = history.find(message => message.role === 'user');
        conversations.unshift({
            id: conversationId,
            title: (firstUserMessage?.content || '新对话').slice(0, 42),
            updatedAt: Date.now(),
            messages: history
        });
        localStorage.setItem(storageKey(), JSON.stringify(conversations.slice(0, 20)));
    }

    async function renderHistoryList() {
        let conversations = [];
        let shouldUseLocalFallback = false;
        try {
            const resp = await fetch('/api/ai-assistant/persona/' + encodeURIComponent(activePersona.id) + '/conversations?sessionId=' + encodeURIComponent(sessionId));
            if (resp.ok) {
                const data = await resp.json();
                conversations = data.conversations || [];
            } else {
                shouldUseLocalFallback = true;
            }
        } catch (e) {
            console.warn('服务端获取对话失败', e);
            shouldUseLocalFallback = true;
        }
        if (shouldUseLocalFallback && !conversations.length) {
            // 只有服务端不可用时才从 localStorage 回退；服务端明确返回空列表时应显示为空。
            conversations = getSavedConversations();
        }
        historyList.replaceChildren();
        if (!conversations.length) {
            const empty = document.createElement('p');
            empty.className = 'history-empty';
            empty.textContent = '还没有保存的对话';
            historyList.appendChild(empty);
            return;
        }
        conversations.forEach(conversation => {
            const item = document.createElement('button');
            item.type = 'button';
            const wrap = document.createElement('div');
            wrap.className = 'history-item-wrap';
            const btn = document.createElement('button');
            btn.className = 'history-item';
            btn.innerHTML = `<span class="history-item-title">${escapeHtml(conversation.title)}</span><span class="history-item-time">${new Intl.DateTimeFormat('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(new Date(conversation.updatedAt))}</span>`;
            btn.addEventListener('click', () => loadConversation(conversation));
            wrap.appendChild(btn);
            const renameBtn = document.createElement('button');
            renameBtn.className = 'history-action-btn rename';
            renameBtn.innerHTML = '<i class="ri-edit-line"></i>';
            renameBtn.title = '重命名';
            renameBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                renameConversation(conversation);
            });
            wrap.appendChild(renameBtn);
            const delBtn = document.createElement('button');
            delBtn.className = 'history-action-btn';
            delBtn.innerHTML = '<i class="ri-delete-bin-line"></i>';
            delBtn.title = '删除此对话';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteConversation(conversation);
            });
            wrap.appendChild(delBtn);
            historyList.appendChild(wrap);
        });

    async function renameConversation(conv) {
        const newTitle = prompt('输入新名称：', conv.title || '');
        if (!newTitle || newTitle === conv.title) return;
        try {
            await fetch('/api/ai-assistant/persona/' + encodeURIComponent(activePersona.id)
                + '/conversations/' + encodeURIComponent(conv.id) + '/rename', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: newTitle })
            });
        } catch (e) {
            console.warn('服务端重命名失败', e);

        // 同时更新 localStorage
        const convs = getSavedConversations().map(c => {
            if (c.id === conv.id) c.title = newTitle;
            return c;
        });
        localStorage.setItem(storageKey(), JSON.stringify(convs.slice(0, 20)));
        openHistory();

    async function deleteConversation(conv) {
        if (!confirm('确认删除此对话？')) return;
        try {
            const resp = await fetch('/api/ai-assistant/persona/' + encodeURIComponent(activePersona.id) + '/conversations/' + encodeURIComponent(conv.id), {
                method: 'DELETE'
            });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
        } catch (e) {
            console.warn('服务端删除失败', e);
            alert('删除失败，请稍后重试。');
            return;
        }
        // 同时从 localStorage 删除
        const convs = getSavedConversations().filter(c => c.id !== conv.id);
        localStorage.setItem(storageKey(), JSON.stringify(convs.slice(0, 20)));
        if (conv.id === conversationId) {
            resetConversation();
        }
        openHistory();
    }

    function loadConversation(conversation) {
        // 如果有完整的消息列表，直接加载
        if (Array.isArray(conversation.messages) && conversation.messages.length > 0) {
            history = conversation.messages;
            conversationId = conversation.id;
            messagesElement.replaceChildren();
            welcomeElement.hidden = history.length > 0;
            history.forEach(message => createMessage(message.role, message.content, { instant: true }));
            closeHistory();
            input.focus();
            return;
        }
        // 从服务端获取完整消息
        fetch('/api/ai-assistant/persona/' + encodeURIComponent(activePersona.id) + '/conversations/' + encodeURIComponent(conversation.id))
            .then(resp => resp.ok ? resp.json() : Promise.reject('HTTP ' + resp.status))
            .then(data => {
                const msgs = data.messages || [];
                history = msgs.map(m => ({ role: m.role, content: m.content }));
                conversationId = data.id || conversation.id;
                messagesElement.replaceChildren();
                welcomeElement.hidden = history.length > 0;
                history.forEach(message => createMessage(message.role, message.content, { instant: true }));
                closeHistory();
                input.focus();
            })
            .catch(e => {
                console.warn('获取对话失败', e);
                // 回退：作为新对话打开
                history = [];
                conversationId = conversation.id;
                messagesElement.replaceChildren();
                welcomeElement.hidden = false;
                closeHistory();
                input.focus();
            });
    }

    async function sendMessage(text) {
        if (!text || isStreaming) return;
        const requestHistory = history.slice();
        welcomeElement.hidden = true;
        createMessage('user', text);
        history.push({ role: 'user', content: text });
        input.value = '';
        autoResizeInput();
        setStreamingState(true);
        abortController = new AbortController();

        let assistantElement = null;
        let fullContent = '';

        try {
            const requestBody = {
                message: text,
                history: requestHistory,
                persona: activePersona.id,
                sessionId: sessionId,
                conversationId: conversationId
            };
            if (activePersona.id !== 'default') {
                requestBody.personaPrompt = true;
            }
            const response = await fetch('/api/ai-assistant/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody),
                signal: abortController.signal
            });

            throwIfLoginResponse(response);

            if (!response.ok) {
                throw new Error(await readRequestError(response));
            }

            assistantElement = createMessage('assistant', '');
            assistantElement.classList.add('typing');
            activityElement.hidden = true;
            fullContent = await readStream(response, content => {
                assistantElement.innerHTML = renderMarkdown(content);
                scrollToBottom('auto');
            });
            if (!fullContent.trim()) {
                fullContent = '[错误] AI 服务没有返回内容，请稍后重试。';
                assistantElement.innerHTML = renderMarkdown(fullContent);
            }

            assistantElement.classList.remove('typing');
            history.push({ role: 'assistant', content: fullContent });
            saveConversation();
        } catch (error) {
            activityElement.hidden = true;
            if (error.name === 'AbortError') {
                if (assistantElement) {
                    assistantElement.classList.remove('typing');
                    if (!fullContent) assistantElement.textContent = '已停止生成。';
                }
            } else {
                if (assistantElement) assistantElement.closest('.message-row').remove();
                createMessage('assistant', `[请求失败] ${error.message || '无法连接到 AI 助手'}`, { error: true });
            }
        } finally {
            abortController = null;
            setStreamingState(false);
            input.disabled = false;
            input.focus();
        }
    }

            if (result.results) {

                }
                createMessage('assistant', msg, { instant: true });
            } else if (result.personas) {

                msg += '**已启动：** ' + result.personas.join('、') + '\n\n';

                msg += '> 📝 服务器日志可查看详细执行结果。';
                createMessage('assistant', msg, { instant: true });

            } else {

    function getPersonaIconHtml(persona) {
        if (!persona) return '<i class="ri-sparkling-2-fill"></i>';
        if (persona.iconUrl && persona.iconUrl.startsWith('http')) {
            return '<img src="' + escapeHtml(persona.iconUrl) + '" alt="" class="avatar-img">';
        }
        if (persona.iconUrl && persona.iconUrl.startsWith('ri-')) {
            return '<i class="' + escapeHtml(persona.iconUrl) + '"></i>';
        }
        if (persona.iconUrl) {
            return '<span class="pi-emoji">' + escapeHtml(persona.iconUrl) + '</span>';
        }
        return '<i class="ri-sparkling-2-fill"></i>';
    }

    async function loadPersonas() {
        if (loadingPersonas) return;
        loadingPersonas = true;
        try {
            const resp = await fetch('/api/ai-assistant/personas');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            personas = data.personas || [];
            persistPersonaCache();
            // 用 API 数据刷新当前 activePersona
            const match = personas.find(p => p.id === activePersona.id);
            if (match) {
                activePersona = match;
            }
            // 尝试恢复之前选中的 persona
            try {
                const savedId = localStorage.getItem(ACTIVE_PERSONA_KEY);
                if (savedId && savedId !== activePersona.id) {
                    const saved = personas.find(p => p.id === savedId);
                    if (saved) { switchPersona(saved); return; }
                }
            } catch(e) {}
            renderPersonaMenu();
            updatePersonaUI();
            // 确保当前 persona 仍存在
            const stillExists = personas.some(p => p.id === activePersona.id);
            if (!stillExists && personas.length > 0) {
                switchPersona(personas[0]);
            }
        } catch (e) {
            console.warn('加载 Persona 列表失败', e);
            // 使用缓存的列表
            try {
                const cached = localStorage.getItem(PERSONA_LIST_KEY);
                if (cached) {
                    personas = JSON.parse(cached);
                    renderPersonaMenu();
            updatePersonaUI();
                }
            } catch (e2) {}
        } finally {
            loadingPersonas = false;
        }
    }

    function renderPersonaMenu() {
        const list = document.getElementById('personaList');
        if (!list) return;
        list.innerHTML = '';
        personas.forEach(p => {
            const item = document.createElement('button');
            item.type = 'button';
            item.className = 'persona-menu-item' + (p.id === activePersona.id ? ' active' : '');
            item.innerHTML = getPersonaIconHtml(p) + '<span>' + escapeHtml(p.displayName || p.id) + '</span>'
                + (p.id === activePersona.id ? '<span class="pi-check"><i class="ri-check-line"></i></span>' : '');
            item.addEventListener('click', () => {
                switchPersona(p);
                closePersonaMenu();
            });
            list.appendChild(item);
        });
    }

    function switchPersona(persona) {
        if (persona.id === activePersona.id) return;
        // 保存当前对话
        saveConversation();
        // 切换 persona
        activePersona = persona;
        // 持久化选中的 persona
        try { localStorage.setItem(ACTIVE_PERSONA_KEY, persona.id); } catch(e) {}
        // 重置对话
        history = [];
        conversationId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
        messagesElement.replaceChildren();
        // 更新 UI
        updatePersonaUI();

    const _origSaveConversation = saveConversation;
    saveConversation = function() {
        // 保存到全局历史记录
        if (!history.length) return;
        const conversations = getSavedConversations().filter(item => item.id !== conversationId);
        const firstUserMessage = history.find(msg => msg.role === 'user');
        conversations.unshift({
            id: conversationId,
            title: (firstUserMessage?.content || '新对话').slice(0, 42),
            updatedAt: Date.now(),
            messages: history.slice(),
            personaId: activePersona.id
        });
        try {
            localStorage.setItem(storageKey(), JSON.stringify(conversations.slice(0, 20)));
        } catch (e) {}
    };

    // Init
    document.addEventListener('DOMContentLoaded', () => {
        // 先获取登录用户的 session
        fetchServerSession().then(() => {
            // 如果服务端有 session，替换之前 localStorage 生成的 sessionId
            if (serverSessionId) {
                sessionId = serverSessionId;
                // 持久化到 localStorage，让同设备下次打开直接用正确的 sessionId
                try { localStorage.setItem(SESSION_KEY, serverSessionId); } catch(e) {}

            // 先加载 Persona 列表（会恢复 localStorage 中保存的角色）
            loadPersonas().then(() => {
                // 此时 activePersona 已正确恢复，再加载服务端对话
                loadServerConversation().then(() => {});

    async function loadServerConversation() {
        try {
            const resp = await fetch('/api/ai-assistant/persona/'
                + encodeURIComponent(activePersona.id)
                + '/conversations/current?sessionId=' + encodeURIComponent(sessionId));
            if (!resp.ok) return false;
            const data = await resp.json();
            const msgs = data.messages || [];
            if (msgs.length === 0) return false;
            history = msgs;
            conversationId = data.id;
            messagesElement.replaceChildren();
            welcomeElement.hidden = false;
            msgs.forEach(msg => createMessage(msg.role, msg.content, { instant: true }));
            welcomeElement.hidden = true;
            return true;
        } catch (e) {
            return false;
        }
    }

    const personaButton = document.getElementById('personaButton');
    const personaMenu = document.getElementById('personaMenu');
    const managePersonaButton = document.getElementById('managePersonaButton');

    if (personaButton) {
        personaButton.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePersonaMenu();
        });
    }

    if (managePersonaButton) {
        managePersonaButton.addEventListener('click', () => {
            closePersonaMenu();
            openPersonaManager();
        });
    }

    const uploadContextButton = document.getElementById('uploadContextButton');
    if (uploadContextButton) {
        uploadContextButton.addEventListener('click', () => {
            closePersonaMenu();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.md,.txt,.adoc,.mdx';
            input.addEventListener('change', async () => {
                const file = input.files?.[0];
                if (!file) return;
                if (file.size > 512 * 1024) {
                    alert('文件大小不能超过 512KB');
                    return;
                }
                try {
                    const form = new FormData();
                    form.append('file', file);
                    const resp = await fetch('/api/ai-assistant/persona/' + encodeURIComponent(activePersona.id) + '/context', {
                        method: 'POST',
                        body: form
                    });
                    if (resp.ok) {
                        alert('上下文已上传成功！\n刷新页面后新对话将包含该上下文。');
                    } else {
                        const err = await resp.json().catch(() => ({}));
                        alert('上传失败: ' + (err.error || resp.statusText));
                    }
                } catch (e) {
                    alert('上传失败: ' + e.message);
                }
            });
            input.click();
        });
    }

    const exportContextButton = document.getElementById('exportContextButton');
    if (exportContextButton) {
        exportContextButton.addEventListener('click', async () => {
            closePersonaMenu();
            try {
                let url = '/api/ai-assistant/persona/' + encodeURIComponent(activePersona.id) + '/context/download';
                if (sessionId) url += '?sessionId=' + encodeURIComponent(sessionId);
                const resp = await fetch(url);
                if (!resp.ok) {
                    alert('导出失败: ' + resp.statusText);
                    return;
                }
                const blob = await resp.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'AGENTS-' + activePersona.id + '.md';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            } catch (e) {
                alert('导出失败: ' + e.message);
            }
        });
    }

    // Click outside to close menu
    document.addEventListener('click', (e) => {
        if (personaMenu && !personaMenu.hidden) {
            const selector = document.querySelector('.persona-selector');
            if (selector && !selector.contains(e.target)) {
                closePersonaMenu();
            }
        }
    });


    // ========== Persona 管理面板 ==========

    function openPersonaManager() {
        renderPersonaManagerList();
        document.getElementById('personaManagerBackdrop').hidden = false;
        document.getElementById('personaManagerDrawer').classList.add('open');
        document.getElementById('personaManagerDrawer').setAttribute('aria-hidden', 'false');
    }

    function closePersonaManager() {
        document.getElementById('personaManagerBackdrop').hidden = true;
        document.getElementById('personaManagerDrawer').classList.remove('open');
        document.getElementById('personaManagerDrawer').setAttribute('aria-hidden', 'true');
    }

    document.addEventListener('DOMContentLoaded', () => {
        const closeBtn = document.getElementById('personaManagerClose');
        const backdrop = document.getElementById('personaManagerBackdrop');
        const uploadBtn = document.getElementById('personaUploadButton');
        if (closeBtn) closeBtn.addEventListener('click', closePersonaManager);
        if (backdrop) backdrop.addEventListener('click', closePersonaManager);
        if (uploadBtn) uploadBtn.addEventListener('click', uploadPersonaFromManager);
    });

    function renderPersonaManagerList() {
        const container = document.getElementById('personaManagerList');
        container.innerHTML = '';
        personas.forEach(p => {
            const card = document.createElement('div');
            card.className = 'persona-card';
            card.innerHTML = renderPersonaEditForm(p);
            container.appendChild(card);
            // 绑定事件
            bindPersonaEditEvents(card, p);
        });
    }

    function renderPersonaEditForm(p) {
        const builtin = p.builtin;
        const icon = getPersonaIconHtml(p);
        const thinkingRaw = p.thinkingPhrases || '[]';
        let thinkingStr = '';
        try { thinkingStr = JSON.parse(thinkingRaw).join('\n'); } catch(e) { thinkingStr = thinkingRaw; }
        const safeId = escapeHtml(p.id);
        const color = escapeHtml(p.brandColor || '#2563eb');

        return '<div class="persona-card-header">'
            + '<span class="persona-card-icon" aria-hidden="true">' + icon + '</span>'
            + '<div class="persona-card-meta">'
            + '<h4 class="persona-card-title">' + escapeHtml(p.displayName || p.id) + '</h4>'
            + '<div class="persona-card-id">' + safeId + '</div>'
            + '</div>'
            + (builtin
                ? '<span class="persona-badge">内置，不可删除</span>'
                : '<button class="pe-delete-btn button persona-danger-button" data-pid="' + safeId + '" type="button"><i class="ri-delete-bin-6-line"></i><span>删除</span></button>')
            + '</div>'
            + '<div class="persona-card-body">'
            + '<label class="persona-field">显示名称<input class="pe-field" data-field="displayName" data-pid="' + safeId + '" value="' + escapeHtml(p.displayName || '') + '"></label>'
            + '<label class="persona-field">欢迎语<input class="pe-field" data-field="greeting" data-pid="' + safeId + '" value="' + escapeHtml(p.greeting || '') + '"></label>'
            + '<label class="persona-field persona-field-wide">简介<textarea class="pe-field" data-field="description" data-pid="' + safeId + '" rows="2">' + escapeHtml(p.description || '') + '</textarea></label>'
            + '<label class="persona-field">头像 / Remix 图标<input class="pe-field" data-field="iconUrl" data-pid="' + safeId + '" value="' + escapeHtml(p.iconUrl || '') + '" placeholder="ri-team-fill 或 https://..."></label>'
            + '<label class="persona-field">品牌色<div class="persona-color-row"><span class="persona-color-swatch" style="--persona-color:' + color + '"></span><input class="pe-field" data-field="brandColor" data-pid="' + safeId + '" value="' + color + '"></div></label>'
            + '<label class="persona-field persona-field-wide">思考短语（每行一个）<textarea class="pe-field" data-field="thinkingPhrases" data-pid="' + safeId + '" rows="3">' + escapeHtml(thinkingStr) + '</textarea></label>'
            + '</div>'
            + '<div class="persona-card-footer">'
            + '<button class="pe-save-btn button button-primary" data-pid="' + safeId + '" type="button"><i class="ri-save-3-line"></i><span>保存更改</span></button>'
            + '<span class="pe-status persona-status" style="display:none">已保存 ✓</span>'
            + '</div>';
    }

    function bindPersonaEditEvents(card, p) {
        const saveBtn = card.querySelector('.pe-save-btn');
        const deleteBtn = card.querySelector('.pe-delete-btn');
        const statusEl = card.querySelector('.pe-status');
        if (saveBtn) {
            saveBtn.addEventListener('click', async () => {
                const fields = {};
                card.querySelectorAll('.pe-field').forEach(field => {
                    const fname = field.dataset.field;
                    if (fname === 'thinkingPhrases') {
                        const lines = field.value.split('\n').map(l => l.trim()).filter(Boolean);
                        fields[fname] = JSON.stringify(lines);
                    } else {
                        fields[fname] = field.value.trim();
                    }
                });
                try {
                    saveBtn.disabled = true;
                    statusEl.style.display = 'inline';
                    statusEl.textContent = '保存中…';
                    statusEl.style.color = 'var(--text-muted)';
                    const resp = await fetch('/api/ai-assistant/persona/' + encodeURIComponent(p.id), {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(fields)
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        const updated = data.persona || data;
                        if (!updated || !updated.id) throw new Error('保存响应缺少 persona');
                        statusEl.textContent = '已保存 ✓';
                        statusEl.style.color = 'var(--success)';
                        upsertPersona(updated);
                        // 1.5s 后隐藏
                        setTimeout(() => { statusEl.style.display = 'none'; }, 1500);
                    } else {
                        const err = await resp.json().catch(() => ({}));
                        statusEl.textContent = '失败: ' + (err.error || '未知错误');
                        statusEl.style.color = 'var(--danger)';
                    }
                } catch (e) {
                    statusEl.textContent = e.message || '网络错误';
                    statusEl.style.color = 'var(--danger)';
                } finally {
                    saveBtn.disabled = false;
                }
            });
        }
        if (deleteBtn) {
            deleteBtn.addEventListener('click', () => deletePersonaFromManager(p, deleteBtn, statusEl));
        }
    }

    async function uploadPersonaFromManager() {
        const fileInput = document.getElementById('personaUploadFile');
        const iconInput = document.getElementById('personaUploadIcon');
        const uploadBtn = document.getElementById('personaUploadButton');
        const statusEl = document.getElementById('personaUploadStatus');
        const file = fileInput?.files?.[0];
        if (!file) {
            statusEl.textContent = '请选择 SKILL.md 文件';
            statusEl.style.color = 'var(--danger)';
            return;
        }
        const originalHtml = uploadBtn.innerHTML;
        uploadBtn.disabled = true;
        statusEl.textContent = '上传中…';
        statusEl.style.color = 'var(--text-muted)';
        try {
            const form = new FormData();
            form.append('file', file);
            const uploadResp = await fetch('/api/ai-assistant/persona/upload', {
                method: 'POST',
                body: form
            });
            const uploadData = await uploadResp.json().catch(() => ({}));
            if (!uploadResp.ok) throw new Error(uploadData.error || '上传失败');
            let uploaded = uploadData.persona || uploadData;
            if (!uploaded || !uploaded.id) throw new Error('上传响应缺少 persona');

            const iconValue = (iconInput?.value || '').trim();
            if (iconValue) {
                const updateResp = await fetch('/api/ai-assistant/persona/' + encodeURIComponent(uploaded.id), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ iconUrl: iconValue })
                });
                const updateData = await updateResp.json().catch(() => ({}));
                if (!updateResp.ok) throw new Error(updateData.error || '头像更新失败');
                uploaded = updateData.persona || updateData;
            }

            upsertPersona(uploaded);
            renderPersonaManagerList();
            if (fileInput) fileInput.value = '';
            if (iconInput) iconInput.value = '';
            statusEl.textContent = '已新增角色 ✓';
            statusEl.style.color = 'var(--success)';
        } catch (e) {
            statusEl.textContent = e.message || '上传失败';
            statusEl.style.color = 'var(--danger)';
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.innerHTML = originalHtml;
        }
    }

    async function deletePersonaFromManager(persona, button, statusEl) {
        if (!persona || persona.builtin) return;
        if (!confirm('确认删除该角色？此操作不会删除已有历史对话。')) return;
        button.disabled = true;
        if (statusEl) {
            statusEl.style.display = 'inline';
            statusEl.textContent = '删除中…';
            statusEl.style.color = 'var(--text-muted)';
        }
        try {
            const resp = await fetch('/api/ai-assistant/persona/' + encodeURIComponent(persona.id), {
                method: 'DELETE'
            });
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error || '删除失败');
            }
            personas = personas.filter(p => p.id !== persona.id);
            if (activePersona.id === persona.id) {
                const fallback = personas.find(p => p.id === 'default') || personas[0] || {
                    id: 'default',
                    displayName: 'AI 智能助手',
                    iconUrl: null,
                    brandColor: '#2563eb',
                    greeting: '你好，我是 Halo AI 智能助手',
                    thinkingPhrases: '[]'
                };
                activePersona = fallback;
                try { localStorage.setItem(ACTIVE_PERSONA_KEY, activePersona.id); } catch(e) {}
                history = [];
                conversationId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
                messagesElement.replaceChildren();
                welcomeElement.hidden = false;
                loadPersonaConversations();
            }
            persistPersonaCache();
            renderPersonaMenu();
            updatePersonaUI();
            renderPersonaManagerList();
        } catch (e) {
            if (statusEl) {
                statusEl.textContent = e.message || '删除失败';
                statusEl.style.color = 'var(--danger)';
            }
            button.disabled = false;
        }
    }

</script>

    <!-- Persona 管理面板 -->
    <div class="drawer-backdrop" id="personaManagerBackdrop" hidden></div>
    <div class="history-drawer persona-manager-drawer" id="personaManagerDrawer">
        <div class="drawer-header">
            <h2>管理角色</h2>
            <button class="button button-icon" id="personaManagerClose" type="button" aria-label="关闭管理角色">
                <i class="ri-close-line" aria-hidden="true"></i>
            </button>
        </div>
        <div class="persona-manager-body">
            <section class="persona-upload-panel">
                <h4 class="persona-upload-title">上传 SKILL.md 新增角色</h4>
                <div class="persona-upload-grid">
                    <input id="personaUploadFile" type="file" accept=".md,.txt">
                    <input id="personaUploadIcon" type="text" placeholder="可选头像：ri-team-fill 或 https://...">
                    <div class="persona-upload-actions">
                        <button class="button button-primary" id="personaUploadButton" type="button"><i class="ri-upload-cloud-2-line"></i><span>上传角色</span></button>
                        <span id="personaUploadStatus" class="persona-status"></span>
                    </div>
                </div>
            </section>
            <div id="personaManagerList"></div>
        </div>
    </div>
</body>
</html>
