<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老巫师 AI 助手 - 控制台</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css">
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:#f5f6f8;color:#1f2937;display:flex;flex-direction:column;height:100vh;}
.header{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.header h1{margin:0;font-size:16px;font-weight:700;}
.header .subtitle{font-size:12px;color:#6b7280;margin-top:2px;}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.message{max-width:85%;padding:10px 14px;border-radius:8px;line-height:1.5;font-size:14px;white-space:pre-wrap;word-break:break-word;}
.message.user{margin-left:auto;background:#2563eb;color:#fff;}
.message.assistant{margin-right:auto;background:#fff;border:1px solid #e5e7eb;color:#1f2937;}
.composer{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #e5e7eb;background:#fff;flex-shrink:0;}
.composer input{flex:1;padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;}
.composer input:focus{border-color:#2563eb;}
.composer button{padding:8px 20px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-weight:600;cursor:pointer;}
.composer button:disabled{opacity:.5;cursor:not-allowed;}
.welcome{text-align:center;padding:40px 20px;color:#6b7280;}
.welcome h2{margin:0 0 8px;font-size:18px;color:#1f2937;}
.welcome p{margin:0;font-size:14px;}
.open-immersive{display:block;text-align:center;padding:12px;font-size:13px;color:#2563eb;text-decoration:none;border-top:1px solid #e5e7eb;flex-shrink:0;}
.open-immersive:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="header">
<i class="ri-sparkling-2-fill" style="font-size:24px;color:#2D1B69;"></i>
<div><h1>老巫师 AI 助手</h1><div class="subtitle">在 Halo Console 中使用 AI 助手管理站点内容</div></div>
</div>
<div class="messages" id="messages">
<div class="welcome" id="welcome">
<h2>你好，我是老巫师</h2>
<p>我可以帮你管理文章、分类、标签和评论。</p>
</div>
</div>
<div class="composer">
<input id="input" placeholder="输入消息…" autofocus>
<button id="sendBtn" onclick="send()">发送</button>
</div>
<a class="open-immersive" href="/api/ai-assistant/chat-page" target="_blank">
<i class="ri-external-link-line"></i> 打开沉浸式模式
</a>
<script>
const messagesEl=document.getElementById('messages');
const welcomeEl=document.getElementById('welcome');
const input=document.getElementById('input');
let isStreaming=false;
let history=[];
let abortController=null;

function addMessage(role,text){
const div=document.createElement('div');
div.className='message '+role;
div.textContent=text;
messagesEl.appendChild(div);
messagesEl.scrollTop=messagesEl.scrollHeight;
return div;
}

async function send(){
const text=input.value.trim();
if(!text||isStreaming)return;
welcomeEl.style.display='none';
addMessage('user',text);
history.push({role:'user',content:text});
input.value='';
isStreaming=true;
document.getElementById('sendBtn').disabled=true;
abortController=new AbortController();
try{
const resp=await fetch('/api/ai-assistant/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:text,history:history.slice(0,-1),persona:'default',sessionId:'console-'+Date.now()}),
signal:abortController.signal
});
if(!resp.ok){
const errText=await resp.text();
addMessage('assistant','[请求失败] '+(errText||'HTTP '+resp.status));
return;
}
const reader=resp.body.getReader();
const decoder=new TextDecoder();
let buffer='';
let assistantEl=null;
while(true){
const{done,value}=await reader.read();
if(done)break;
buffer+=decoder.decode(value,{stream:!done});
if(!assistantEl)assistantEl=addMessage('assistant','');
assistantEl.textContent=buffer;
messagesEl.scrollTop=messagesEl.scrollHeight;
}
if(buffer.trim())history.push({role:'assistant',content:buffer});
}catch(error){
if(error.name!=='AbortError')addMessage('assistant','[请求失败] '+error.message);
}finally{
isStreaming=false;
document.getElementById('sendBtn').disabled=false;
abortController=null;
}
}

input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
</script>
</body>
</html>
